version: "2"
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
linters:
  default: all
  settings:
    funlen:
      lines: 65
    wsl_v5:
      allow-whole-block: true
    cyclop:
      max-complexity: 15
  disable:
    - canonicalheader
    - depguard
    - gomoddirectives
    - musttag
    - nlreturn
    - tagliatelle
    - varnamelen
    - wsl
    - noinlineerr
    - funcorder
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # general rules
      - linters:
          - funlen
          - ireturn
          - goconst
          - lll
          - exhaustruct
        path: .*_test\.go
      - linters:
          - lll
        source: "^//go:generate "
      - linters:
          - gochecknoglobals
        text: Version is a global variable
      - linters:
          - ireturn
          - lll
        path: schema\.resolvers\.go

      # jsontmpl: pure-Go Kriti port. The evaluator is built on the open
      # `Value = any` type, so every helper that returns a runtime value
      # trips ireturn, and returning `(nil, nil)` is correct because JSON
      # null is a legitimate Value (nilnil). The Function/Type/Index error
      # strings are reproduced verbatim from upstream Kriti — the console
      # matches on them — which trips err113 and revive's error-strings.
      - linters:
          - ireturn
          - err113
          - nilnil
          # Opinionated style linters: the lexer/parser are a faithful
          # hand-port of upstream Kriti and follow its control-flow shape,
          # so the whitespace/struct-completeness/magic-number conventions
          # are deliberately not idiomatic-Go here.
          - wsl_v5
          - exhaustruct
          - paralleltest
          - mnd
        path: internal/lib/jsontmpl/
      - linters:
          - revive
          - staticcheck
        path: internal/lib/jsontmpl/
        text: error-strings|ST1005
      # jsontmpl: structural consequences of the faithful Kriti port — large
      # lexer/parser switch-and-dispatch functions, duplicated table-driven
      # tests, and the package-level render cache. Same rationale as the
      # carve-outs above.
      - linters:
          - exhaustive
          - gocyclo
          - cyclop
          - maintidx
          - funlen
          - dupl
          - gochecknoglobals
          - testpackage
          - dupword
          - lll
          - nolintlint
        path: internal/lib/jsontmpl/
      # Package names mirror upstream Kriti (ast/parser/token) and close/cap
      # are used as local identifiers in the ported lexer/parser.
      - linters:
          - revive
          - predeclared
        path: internal/lib/jsontmpl/
        text: redefines-builtin-id|var-naming|same name as predeclared
      # parser.go assembles literal fragments with += inside the ported
      # scanner loops; rewriting to strings.Builder reshuffles the
      # flush/span bookkeeping of a faithful port (see UPSTREAM.md) for no
      # real gain on these short key/string fragments.
      - linters:
          - modernize
          - perfsprint
        path: internal/lib/jsontmpl/parser/

      # storage service specific rules
      - linters:
          - gochecknoglobals
          - gochecknoinits
        path: services/storage/cmd/

    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - schema\.resolvers\.go
