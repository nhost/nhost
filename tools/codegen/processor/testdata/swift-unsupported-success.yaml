openapi: "3.0.0"
info:
  title: Swift unsupported success fixture
  version: "1.0"
paths:
  /mixed:
    get:
      operationId: mixedSuccess
      responses:
        "200":
          description: JSON success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessA"
        "204":
          description: Empty success
components:
  schemas:
    SuccessA:
      type: object
      properties:
        value:
          type: string
