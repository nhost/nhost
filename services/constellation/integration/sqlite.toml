[[remote_schemas]]
    name = 'rs'

    [remote_schemas.definition]
        url = '{{NHOST_FUNCTIONS_URL}}/remote-schema'
        timeout_seconds = 60
        forward_client_headers = true

        [[remote_schemas.definition.headers]]
            name = 'x-nhost-webhook-secret'
            value = '{{NHOST_WEBHOOK_SECRET}}'

    [[remote_schemas.permissions]]
        role = 'user'

        [remote_schemas.permissions.definition]
            schema = """
schema {
  query: Query
  mutation: Mutation
}
type Game {
  awayScore: Int!
  awayTeam: Team!
  homeScore: Int!
  homeTeam: Team!
  id: ID!
  playedAt: String!
  source: String!
}
type Mutation {
  recordMyTeamGame(teamId: ID! @preset(value: \"x-hasura-team-id\"), opponentId: ID!, teamScore: Int!, opponentScore: Int!, isHome: Boolean!): Game!
  reportGame(homeTeamId: ID! @preset(value: \"x-hasura-team-id\"), awayTeamId: ID!, homeScore: Int!, awayScore: Int!, source: String! @preset(value: \"user-reported\")): Game!
}
type Query {
  game(id: ID!): Game
  games: [Game!]!
  leaderboard: [Team!]!
  myTeam(teamId: ID! @preset(value: \"x-hasura-team-id\")): Team
  team(id: ID!): Team
  teamByDepartment(departmentId: ID!): Team
  teamGames(teamId: ID! @preset(value: \"x-hasura-team-id\")): [Game!]!
  teams: [Team!]!
}
type Team {
  departmentId: ID!
  departmentName: String!
  draws: Int!
  gamesPlayed: Int!
  goalDifference: Int!
  goalsAgainst: Int!
  goalsFor: Int!
  id: ID!
  losses: Int!
  name: String!
  points: Int!
  wins: Int!
}
"""

    [[remote_schemas.remote_relationships]]
        type_name = 'Team'

        [[remote_schemas.remote_relationships.relationships]]
            name = 'department'

                [remote_schemas.remote_relationships.relationships.definition.to_source]
                    relationship_type = 'object'
                    source = 'default'

                    [remote_schemas.remote_relationships.relationships.definition.to_source.field_mapping]
                        departmentId = 'id'

                    [remote_schemas.remote_relationships.relationships.definition.to_source.table]
                        name = 'departments'
                        schema = 'public'
