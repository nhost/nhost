table:
  name: exercise_logs
  schema: public
array_relationships:
  - name: sets
    using:
      foreign_key_constraint_on:
        columns:
          - parent_id
          - parent_kind
        table:
          name: exercise_log_sets
          schema: public
insert_permissions:
  - role: user
    permission:
      check:
        owner_id:
          _eq: X-Hasura-User-Id
      columns:
        - kind
        - owner_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - kind
        - owner_id
      filter:
        owner_id:
          _eq: X-Hasura-User-Id
