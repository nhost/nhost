  custom_name: users
  custom_root_fields:
    delete: deleteUsers
    delete_by_pk: deleteUser
    insert: insertUsers
    insert_one: insertUser
    select: users
    select_aggregate: usersAggregate
    select_by_pk: user
    update: updateUsers
    update_by_pk: updateUser
object_relationships:
  - name: defaultRoleByRole
    using:
      foreign_key_constraint_on: default_role
array_relationships:
  - name: departments
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: user_departments
          schema: public
  - name: kbEntries
    using:
      foreign_key_constraint_on:
        column: uploader_id
        table:
          name: kb_entries
          schema: public
  - name: oauth2AuthRequests
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: oauth2_auth_requests
          schema: auth
  - name: oauth2RefreshTokens
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: oauth2_refresh_tokens
          schema: auth
  - name: refreshTokens
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: refresh_tokens
          schema: auth
  - name: roles
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: user_roles
          schema: auth
  - name: securityKeys
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: user_security_keys
          schema: auth
  - name: userProviders
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: user_providers
          schema: auth
remote_relationships:
  - definition:
      to_source:
        field_mapping:
          id: user_id
        relationship_type: object
        source: other
        table:
          name: user_profiles
          schema: public
    name: profile
