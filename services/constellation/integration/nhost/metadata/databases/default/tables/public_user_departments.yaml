table:
  name: user_departments
  schema: public
object_relationships:
  - name: department
    using:
      foreign_key_constraint_on: department_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: mixed_permissions
    permission:
      check: {}
      columns:
        - is_active
        - role
        - joined_at
        - department_id
        - user_id
    comment: ""
  - role: queries_relationships
    permission:
      check: {}
      columns:
        - is_active
        - role
        - joined_at
        - department_id
        - user_id
    comment: ""
  - role: user
    permission:
      check:
        department_id:
          _in: x-hasura-department-manager
      columns:
        - department_id
        - is_active
        - role
        - user_id
    comment: ""
select_permissions:
  - role: mixed_permissions
    permission:
      columns:
        - is_active
        - role
        - joined_at
        - department_id
        - user_id
      filter: {}
    comment: ""
  - role: queries_relationships
    permission:
      columns:
        - is_active
        - role
        - joined_at
        - department_id
        - user_id
      filter: {}
    comment: ""
  - role: queries_relationships_aggregation
    permission:
      columns:
        - is_active
        - role
        - joined_at
        - department_id
        - user_id
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: user
    permission:
      columns:
        - is_active
        - role
        - joined_at
        - department_id
        - user_id
      filter:
        department_id:
          _in: X-Hasura-departments
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: mixed_permissions
    permission:
      columns:
        - is_active
        - role
        - joined_at
        - department_id
        - user_id
      filter: {}
      check: {}
    comment: ""
  - role: queries_relationships
    permission:
      columns:
        - is_active
        - role
        - joined_at
        - department_id
        - user_id
      filter: {}
      check: {}
    comment: ""
  - role: user
    permission:
      columns:
        - is_active
        - role
      filter:
        department_id:
          _in: x-hasura-department-manager
      check: null
    comment: ""
delete_permissions:
  - role: mixed_permissions
    permission:
      filter: {}
    comment: ""
  - role: queries_relationships
    permission:
      filter: {}
    comment: ""
  - role: user
    permission:
      filter:
        department_id:
          _in: x-hasura-department-manager
    comment: ""
