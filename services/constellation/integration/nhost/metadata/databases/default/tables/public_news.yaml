table:
  name: news
  schema: public
object_relationships:
  - name: author
    using:
      foreign_key_constraint_on: author_id
  - name: department
    using:
      foreign_key_constraint_on: department_id
insert_permissions:
  - role: user
    permission:
      check:
        department_id:
          _in: X-Hasura-department-manager
      set:
        author_id: x-hasura-user-id
      columns:
        - content
        - department_id
        - is_public
        - title
    comment: ""
select_permissions:
  - role: exists_test
    permission:
      columns:
        - content
        - title
        - created_at
        - updated_at
        - id
      filter:
        _exists:
          _table:
            name: user_departments
            schema: public
          _where:
            user_id:
              _eq: X-Hasura-User-Id
    comment: Only allow reading news if user is a member of at least one department
  - role: public
    permission:
      columns:
        - content
        - title
        - created_at
        - updated_at
        - id
      filter:
        is_public:
          _eq: true
    comment: ""
  - role: user
    permission:
      columns:
        - content
        - created_at
        - id
        - is_public
        - title
        - updated_at
      filter: {}
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - content
        - is_public
        - title
      filter: {}
      check: {}
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter: {}
    comment: ""
