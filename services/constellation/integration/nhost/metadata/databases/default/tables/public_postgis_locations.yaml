    permission:
      columns:
        - id
        - name
        - geog
      filter: {}
  - role: user
    permission:
      columns:
        - id
        - name
        - geom
        - geog
        - area
        - nullable_geom
      filter: {}
      allow_aggregations: true
update_permissions:
  - role: user
    permission:
      columns:
        - name
        - geom
        - geog
        - area
        - nullable_geom
      filter: {}
      check: {}
delete_permissions:
  - role: user
    permission:
      filter: {}
