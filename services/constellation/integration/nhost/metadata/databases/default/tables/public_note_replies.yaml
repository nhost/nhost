table:
  name: note_replies
  schema: public
object_relationships:
  - name: note
    using:
      foreign_key_constraint_on: note_id
insert_permissions:
  - role: user
    permission:
      check:
        _and:
          - note:
              author_id:
                _eq: X-Hasura-User-Id
          - visibility:
              _eq: public
      columns:
        - body
        - visibility
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - note_id
        - visibility
        - body
      filter:
        note:
          author_id:
            _eq: X-Hasura-User-Id
