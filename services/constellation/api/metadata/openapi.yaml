openapi: "3.0.0"

info:
  version: 1.0.0
  title: "Constellation Hasura-compatible Metadata API"
  description: >-
    Hasura `/v1/metadata` wrapper surface served by Constellation. This
    spec describes the envelope and error shape only; per-operation `args`
    are intentionally modelled as a freeform object. The Hasura-defined
    per-op argument types are generated from
    `api/hasura/metadata.openapi.json` (vendored upstream) into the
    `hasura` Go package and consumed by the Go-side dispatcher.
  license:
    name: "MIT License"
    url: "https://opensource.org/licenses/MIT"
  contact:
    name: "Nhost Support"
    url: "https://nhost.io"

servers:
  - url: "/"
    description: "Constellation server"

tags:
  - name: metadata
    description: "Hasura-compatible /v1/metadata operations"

paths:
  /v1/metadata:
    post:
      summary: Hasura-compatible metadata API
      description: >-
        Dispatches on `args.type` to per-op handlers. Operations not yet
        migrated off the Hasura proxy return `{code: "not-supported"}`.
        Admin-only: requests without a valid `X-Hasura-Admin-Secret`
        header are rejected with 401 (no JWT fallback).
      operationId: metadataRequest
      tags:
        - metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadataRequest"
      responses:
        "200":
          description: >-
            Per-operation result. The body shape varies by `type`: most
            ops return `{message: "success"}`, `export_metadata` returns
            `{resource_version, metadata}`, etc. Modelled as a freeform
            object rather than a tagged union to avoid duplicating the
            per-op schemas already typed in the `hasura` package.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: "Malformed envelope, unknown op, or op-level validation failure"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataError"
        "401":
          description: "Missing or invalid admin secret"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataError"

components:
  schemas:
    MetadataRequest:
      type: object
      additionalProperties: false
      required:
        - type
        - args
      properties:
        type:
          type: string
          description: "Operation discriminator (e.g. `export_metadata`, `pg_track_table`)"
          example: "export_metadata"
        args:
          type: object
          additionalProperties: true
          description: >-
            Per-operation arguments. Shape is determined by `type` and
            handled by the Go dispatcher against the `hasura.*` types.
        version:
          type: integer
          description: "Metadata API version (1 or 2; defaults to 1)"
        resource_version:
          type: integer
          description: "Optimistic-concurrency token from the most recent `export_metadata`"
        source:
          type: string
          description: "Source name when the op targets a specific data source"

    MetadataError:
      type: object
      additionalProperties: false
      required:
        - code
        - error
      properties:
        code:
          type: string
          description: >-
            Hasura error code. Known values include `not-supported`,
            `access-denied`, `parse-failed`, `validation-failed`,
            `already-tracked`, `already-exists`.
          example: "not-supported"
        error:
          type: string
          description: "Human-readable error message"
        path:
          type: string
          description: "JSON path into the request where the error originated"
          example: "$.args"
        internal:
          type: object
          additionalProperties: true
          description: "Optional engine-internal detail (omitted in production)"
