package: api
generate:
  models: true
output: api/types.gen.go
output-options:
  # Keep schemas that aren't referenced from any operation. The spec's
  # Hasura-mirrored schemas (PostgresEventTriggerConfEventTriggerConf,
  # RetryConf, PostgresTriggerOpsDef, HeaderConf*, AutoTriggerLogCleanupConfig,
  # CronSchedule, etc.) document the canonical wire shapes for metadata that
  # flows through the dispatcher as raw JSON: event triggers are parsed into
  # the dispatcher's own structs with raw jsontext.Value sinks and stored as
  # []jsontext.Value, then round-tripped verbatim through export_metadata, so
  # no operation lists them as a request body and the Go dispatcher does not
  # import these api.* types. skip-prune keeps them emitted as exported types
  # — documenting the shapes — without anchoring each to a synthetic operation.
  #
  # NOTE: this is global — it retains EVERY unreferenced schema, not just
  # the event-trigger cluster. As a side effect a handful of otherwise
  # unused schemas are also emitted as exported types: GraphQLRequest,
  # GraphQLResponse and GraphQLError* (reachable only from the excluded
  # `graphql`-tagged operations). That dead generated surface is accepted
  # as the cost of keeping the metadata wire schemas without anchoring
  # each one to a synthetic operation. (ValidationError is NOT orphaned —
  # it is referenced from the metadata POST 400 oneOf response and is
  # emitted regardless of skip-prune.)
  skip-prune: true
  exclude-tags:
    - graphql
