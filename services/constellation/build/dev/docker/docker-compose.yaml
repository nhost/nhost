services:
  postgres:
    container_name: exp-postgres
    # Set by services/constellation/Makefile to the Nhost PostgreSQL image,
    # which includes PostGIS for tests that create spatial fixtures.
    image: ${POSTGRES_IMAGE:?POSTGRES_IMAGE must point to a PostGIS-capable PostgreSQL image}
    restart: unless-stopped
    volumes:
      - ./initdb.d:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
