table:
  name: users
  schema: auth
configuration:
  column_config:
    active_mfa_type:
      custom_name: activeMfaType
    avatar_url:
      custom_name: avatarUrl
    created_at:
      custom_name: createdAt
    default_role:
      custom_name: defaultRole
    disabled:
      custom_name: disabled
    display_name:
      custom_name: displayName
    email:
      custom_name: email
    email_verified:
      custom_name: emailVerified
    id:
      custom_name: id
    is_anonymous:
      custom_name: isAnonymous
    last_seen:
      custom_name: lastSeen
    locale:
      custom_name: locale
    new_email:
      custom_name: newEmail
    otp_hash:
      custom_name: otpHash
    otp_hash_expires_at:
      custom_name: otpHashExpiresAt
    otp_method_last_used:
      custom_name: otpMethodLastUsed
    password_hash:
      custom_name: passwordHash
    phone_number:
      custom_name: phoneNumber
    phone_number_verified:
      custom_name: phoneNumberVerified
    ticket:
      custom_name: ticket
    ticket_expires_at:
      custom_name: ticketExpiresAt
    totp_secret:
      custom_name: totpSecret
    updated_at:
      custom_name: updatedAt
    webauthn_current_challenge:
      custom_name: currentChallenge
  custom_name: users
  custom_root_fields:
    delete: deleteUsers
    delete_by_pk: deleteUser
    insert: insertUsers
    insert_one: insertUser
    select: users
    select_aggregate: usersAggregate
    select_by_pk: user
    update: updateUsers
    update_by_pk: updateUser
object_relationships:
  - name: defaultRoleByRole
    using:
      foreign_key_constraint_on: default_role
  - name: role
    using:
      foreign_key_constraint_on: default_role
array_relationships:
  - name: apps
    using:
      foreign_key_constraint_on:
        column: creator_user_id
        table:
          name: apps
          schema: public
  - name: cliTokens
    using:
      manual_configuration:
        column_mapping:
          id: user_id
        insertion_order: null
        remote_table:
          name: cli_tokens
          schema: public
  - name: creatorOfWorkspaces
    using:
      manual_configuration:
        column_mapping:
          id: creator_user_id
        insertion_order: null
        remote_table:
          name: workspaces
          schema: public
  - name: github_app_installations
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: github_app_installations
          schema: public
  - name: organizationMembership
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: organization_members
          schema: public
  - name: payment_methods
    using:
      foreign_key_constraint_on:
        column: added_by_user_id
        table:
          name: payment_methods
          schema: public
  - name: refreshTokens
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: refresh_tokens
          schema: auth
  - name: roles
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: user_roles
          schema: auth
  - name: securityKeys
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: user_security_keys
          schema: auth
  - name: userProviders
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: user_providers
          schema: auth
  - name: workspaceMemberInvitesByInvitedByUserId
    using:
      foreign_key_constraint_on:
        column: invited_by_user_id
        table:
          name: workspace_member_invites
          schema: public
  - name: workspaceMembers
    using:
      manual_configuration:
        column_mapping:
          id: user_id
        insertion_order: null
        remote_table:
          name: workspace_members
          schema: public
  - name: workspace_member_invites
    using:
      foreign_key_constraint_on:
        column: email
        table:
          name: workspace_member_invites
          schema: public
select_permissions:
  - role: sa:bragi
    permission:
      columns:
        - email
      filter: {}
  - role: user
    permission:
      columns:
        - avatar_url
        - display_name
        - email
        - id
        - active_mfa_type
      filter:
        _or:
          - id:
              _eq: X-Hasura-User-Id
          - organizationMembership:
              organization:
                members:
                  user_id:
                    _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - display_name
      filter:
        id:
          _eq: X-Hasura-User-Id
      check: null
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        id:
          _eq: X-Hasura-User-Id
event_triggers:
  - name: user-insert
    definition:
      enable_manual: false
      insert:
        columns: '*'
    retry_conf:
      interval_sec: 10
      num_retries: 0
      timeout_sec: 5
    webhook: '{{NHOST_FUNCTIONS_URL}}/user-insert'
    headers:
      - name: nhost-webhook-secret
        value_from_env: NHOST_WEBHOOK_SECRET
  - name: user-insert-segment
    definition:
      enable_manual: false
      insert:
        columns: '*'
    retry_conf:
      interval_sec: 10
      num_retries: 0
      timeout_sec: 60
    webhook: '{{NHOST_FUNCTIONS_URL}}/events/users/insert/segment'
    headers:
      - name: nhost-webhook-secret
        value_from_env: NHOST_WEBHOOK_SECRET
