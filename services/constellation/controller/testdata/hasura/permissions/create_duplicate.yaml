description: >-
  Re-creating a permission: an identical definition is an idempotent no-op; a
  conflicting definition for the same role is rejected.
source: permission reapply handling (ops_permissions.go, permissionsEqual)

steps:
  - description: Track author
    query: {type: pg_track_table, args: {source: default, table: {schema: public, name: author}}}
    status: 200
    response: {message: success}

  - description: Create select permission for role user
    query:
      type: pg_create_select_permission
      args:
        source: default
        table: {schema: public, name: author}
        role: user
        permission:
          columns: ['id', 'name']
          filter: {}
    status: 200
    response: {message: success}

  - description: Re-create the identical select permission (idempotent)
    query:
      type: pg_create_select_permission
      args:
        source: default
        table: {schema: public, name: author}
        role: user
        permission:
          columns: ['id', 'name']
          filter: {}
    divergence: >-
      Hasura rejects a duplicate create with 400 already-exists; Constellation
      treats a semantically-identical re-apply as an idempotent 200.
      See KNOWN_DIFFERENCES.md.
    status: 200
    response:
      message: already-exists

  - description: Re-create with a DIFFERENT definition is rejected
    query:
      type: pg_create_select_permission
      args:
        source: default
        table: {schema: public, name: author}
        role: user
        permission:
          columns: ['id']
          filter: {}
    status: 400
    response:
      code: already-exists
