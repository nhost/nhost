description: Create and drop a select permission for a non-admin role.
source: tests-py/queries/v1/permissions/create_article_permission_role_user.yaml

steps:
  - description: Track author
    query: {type: pg_track_table, args: {source: default, table: {schema: public, name: author}}}
    status: 200
    response: {message: success}

  - description: Create select permission for role user
    query:
      type: pg_create_select_permission
      args:
        source: default
        table: {schema: public, name: author}
        role: user
        permission:
          columns: ['*']
          filter:
            id: X-Hasura-User-Id
    status: 200
    response: {message: success}

  - description: Drop select permission for role user
    query:
      type: pg_drop_select_permission
      args:
        source: default
        table: {schema: public, name: author}
        role: user
    status: 200
    response: {message: success}
