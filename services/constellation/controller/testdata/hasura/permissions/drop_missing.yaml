description: Dropping a permission that is not configured is not-exists.
source: permission not-found handling (ops_permissions.go, ErrPermissionNotFound)

steps:
  - description: Track author
    query: {type: pg_track_table, args: {source: default, table: {schema: public, name: author}}}
    status: 200
    response: {message: success}

  - description: Drop a select permission that was never created
    query:
      type: pg_drop_select_permission
      args:
        source: default
        table: {schema: public, name: author}
        role: user
    status: 400
    response:
      code: not-exists

  - description: Drop an insert permission that was never created
    query:
      type: pg_drop_insert_permission
      args:
        source: default
        table: {schema: public, name: author}
        role: user
    status: 400
    response:
      code: not-exists
