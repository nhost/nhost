description: >-
  pg_set_table_customization sets and unsets a table's custom_name, custom root
  fields, and per-column config. The cases where a custom name conflicts with
  another tracked node / a relationship field (unexpected / invalid-configuration)
  depend on a whole-schema rebuild and are covered by the live parity harness
  (task #10).
source: >-
  tests-py/queries/v1/set_table_configuration/set_and_unset.yaml,
  tests-py/queries/v1/set_table_configuration/alter_column.yaml

steps:
  - description: Track author
    query: {type: pg_track_table, args: {source: default, table: {schema: public, name: author}}}
    status: 200
    response: {message: success}

  - description: Set table customization (custom name, root fields, column config)
    query:
      type: pg_set_table_customization
      args:
        source: default
        table: {schema: public, name: author}
        configuration:
          custom_name: author_alias
          custom_root_fields:
            select: Authors
          column_config:
            id:
              custom_name: AuthorId
    status: 200
    response: {message: success}

  - description: Unset table customization (empty configuration)
    query:
      type: pg_set_table_customization
      args:
        source: default
        table: {schema: public, name: author}
        configuration:
          custom_root_fields: {}
          column_config: {}
    status: 200
    response: {message: success}

  - description: Set customization on an untracked table
    query:
      type: pg_set_table_customization
      args:
        source: default
        table: {schema: public, name: not_tracked}
        configuration:
          custom_name: x
    status: 400
    response:
      code: not-exists

  - description: Set customization with missing table arg
    query:
      type: pg_set_table_customization
      args:
        source: default
        configuration:
          custom_name: x
    status: 400
    response:
      code: validation-failed
