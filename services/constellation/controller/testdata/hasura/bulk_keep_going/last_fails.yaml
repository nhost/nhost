description: >-
  bulk_keep_going runs every child and reports per-child outcomes; a success is
  {message:...}, a failure is {code, error}. Here the last child fails.
source: api-tests BulkKeepGoingSpec "returns successes when the /last/ query fails"

steps:
  - description: keep_going where the last child fails
    query:
      type: bulk_keep_going
      args:
        - type: pg_track_table
          args: {source: default, table: {schema: public, name: author}}
        - type: pg_drop_relationship
          args:
            source: default
            table: {schema: public, name: author}
            relationship: nope
    status: 200
    response:
      - {message: success}
      - {code: not-exists}

  - description: The successful child persisted - author is tracked (re-track is idempotent)
    query:
      type: pg_track_table
      args: {source: default, table: {schema: public, name: author}}
    status: 200
    response:
      message: already-tracked
