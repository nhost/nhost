description: >-
  clear_metadata resets the metadata to empty. Afterwards the previously-tracked
  table (and indeed the whole source) is gone, so operating on it fails.
source: tests-py/queries/v1/metadata/clear_metadata.yaml

steps:
  - description: Track author
    query: {type: pg_track_table, args: {source: default, table: {schema: public, name: author}}}
    status: 200
    response: {message: success}

  - description: Clear metadata
    query: {type: clear_metadata, args: {}}
    status: 200
    response: {message: success}

  - description: After clear, the default source no longer exists
    query: {type: pg_untrack_table, args: {source: default, table: {schema: public, name: author}}}
    status: 400
    response:
      code: not-exists
