description: >-
  Rename a relationship; renaming onto an existing relationship name is rejected
  with already-exists.
source: tests-py/queries/v1/relationships/array_relationship_manual.yaml

steps:
  - description: Track author
    query: {type: pg_track_table, args: {source: default, table: {schema: public, name: author}}}
    status: 200
    response: {message: success}

  - description: Track article
    query: {type: pg_track_table, args: {source: default, table: {schema: public, name: article}}}
    status: 200
    response: {message: success}

  - description: Create array relationship author.articles (manual)
    query:
      type: pg_create_array_relationship
      args:
        source: default
        table: {schema: public, name: author}
        name: articles
        using:
          manual_configuration:
            remote_table: {schema: public, name: article}
            column_mapping: {id: author_id}
    status: 200
    response: {message: success}

  - description: Create array relationship author.recent (manual)
    query:
      type: pg_create_array_relationship
      args:
        source: default
        table: {schema: public, name: author}
        name: recent
        using:
          manual_configuration:
            remote_table: {schema: public, name: article}
            column_mapping: {id: author_id}
    status: 200
    response: {message: success}

  - description: Rename author.articles -> articles_array
    query:
      type: pg_rename_relationship
      args:
        source: default
        table: {schema: public, name: author}
        name: articles
        new_name: articles_array
    status: 200
    response: {message: success}

  - description: Rename author.recent onto the existing name articles_array fails
    query:
      type: pg_rename_relationship
      args:
        source: default
        table: {schema: public, name: author}
        name: recent
        new_name: articles_array
    status: 400
    response:
      code: already-exists
