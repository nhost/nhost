description: Dropping or renaming a relationship that does not exist is not-exists.
source: relationship not-found handling (ops_tables.go, ErrRelationshipNotFound)

steps:
  - description: Track author
    query: {type: pg_track_table, args: {source: default, table: {schema: public, name: author}}}
    status: 200
    response: {message: success}

  - description: Drop a non-existent relationship
    query:
      type: pg_drop_relationship
      args:
        source: default
        table: {schema: public, name: author}
        relationship: nope
    status: 400
    response:
      code: not-exists

  - description: Rename a non-existent relationship
    query:
      type: pg_rename_relationship
      args:
        source: default
        table: {schema: public, name: author}
        name: nope
        new_name: nope2
    status: 400
    response:
      code: not-exists
