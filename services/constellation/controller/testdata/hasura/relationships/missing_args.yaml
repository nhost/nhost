description: >-
  Arg validation for relationship ops: create requires table + name, drop
  requires relationship, rename requires name + new_name. Missing required fields
  are rejected with validation-failed before any mutation runs.
source: relationship arg validation (ops_postgres.go, ops_tables.go)

steps:
  - description: Track author
    query: {type: pg_track_table, args: {source: default, table: {schema: public, name: author}}}
    status: 200
    response: {message: success}

  - description: Create object relationship missing name
    query:
      type: pg_create_object_relationship
      args:
        source: default
        table: {schema: public, name: author}
        using:
          manual_configuration:
            remote_table: {schema: public, name: article}
            column_mapping: {id: author_id}
    status: 400
    response:
      code: validation-failed

  - description: Drop relationship missing relationship name
    query:
      type: pg_drop_relationship
      args:
        source: default
        table: {schema: public, name: author}
    status: 400
    response:
      code: validation-failed

  - description: Rename relationship missing new_name
    query:
      type: pg_rename_relationship
      args:
        source: default
        table: {schema: public, name: author}
        name: articles
    status: 400
    response:
      code: validation-failed
