description: Track / untrack a table in a non-public schema (hge_tests.resident).
source: tests-py/queries/v1/track_table/track_untrack_table_non_public_schema.yaml

steps:
  - description: Track table in non-public schema
    query:
      type: pg_track_table
      args:
        source: default
        table: {schema: hge_tests, name: resident}
    status: 200
    response:
      message: success

  - description: Untrack table in non-public schema
    query:
      type: pg_untrack_table
      args:
        source: default
        table: {schema: hge_tests, name: resident}
    status: 200
    response:
      message: success

  - description: Untrack already-untracked table in non-public schema
    query:
      type: pg_untrack_table
      args:
        source: default
        table: {schema: hge_tests, name: resident}
    status: 400
    response:
      code: already-untracked
