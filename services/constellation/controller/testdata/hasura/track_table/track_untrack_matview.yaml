description: >-
  Track / untrack a materialized view. At the metadata layer a matview is
  tracked exactly like a table, so the idempotency and already-untracked codes
  match the table case. (The GraphQL-surface arms of the Hasura case — asserting
  a matview has query but no mutation fields — are LIVE/SDL concerns, not part of
  the offline metadata harness.)
source: tests-py/queries/v1/track_table/track_untrack_materialized_view.yaml

steps:
  - description: Track materialized view
    query:
      type: pg_track_table
      args:
        source: default
        table: {schema: public, name: articles}
    status: 200
    response:
      message: success

  - description: Track already-tracked materialized view (idempotent)
    query:
      type: pg_track_table
      args:
        source: default
        table: {schema: public, name: articles}
    divergence: >-
      Hasura: 400 code=already-tracked. Constellation: 200 message=already-tracked
      (idempotent re-apply). See KNOWN_DIFFERENCES.md.
    status: 200
    response:
      message: already-tracked

  - description: Untrack materialized view
    query:
      type: pg_untrack_table
      args:
        source: default
        table: {schema: public, name: articles}
    status: 200
    response:
      message: success

  - description: Untrack already-untracked materialized view
    query:
      type: pg_untrack_table
      args:
        source: default
        table: {schema: public, name: articles}
    status: 400
    response:
      code: already-untracked
