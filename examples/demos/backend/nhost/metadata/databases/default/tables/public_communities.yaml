table:
  name: communities
  schema: public
array_relationships:
  - name: community_files
    using:
      foreign_key_constraint_on:
        column: community_id
        table:
          name: community_files
          schema: public
  - name: members
    using:
      foreign_key_constraint_on:
        column: community_id
        table:
          name: community_members
          schema: public
computed_fields:
  - name: is_member
    definition:
      function:
        name: community_is_member
        schema: public
      session_argument: user_session
    comment: Whether the current user is a member of this community
  - name: my_joined_at
    definition:
      function:
        name: community_my_joined_at
        schema: public
      session_argument: user_session
    comment: When the current user joined this community, or null if they aren't a member
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - name
        - description
        - created_at
        - updated_at
      computed_fields:
        - is_member
        - my_joined_at
      filter: {}
update_permissions:
  - role: user
    permission:
      columns:
        - description
      filter:
        members:
          user_id:
            _eq: X-Hasura-User-Id
      check:
        members:
          user_id:
            _eq: X-Hasura-User-Id
event_triggers:
  - name: community_description_updated
    definition:
      enable_manual: true
      update:
        columns:
          - description
    retry_conf:
      interval_sec: 10
      num_retries: 3
      timeout_sec: 60
    webhook: '{{NHOST_FUNCTIONS_URL}}/events/community-updated'
    headers:
      - name: nhost-webhook-secret
        value_from_env: NHOST_WEBHOOK_SECRET
    cleanup_config:
      batch_size: 10000
      clean_invocation_logs: true
      clear_older_than: 168
      paused: false
      schedule: 0 0 * * *
      timeout: 60
