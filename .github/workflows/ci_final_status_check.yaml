---
name: "ci: final status check"

on:
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('mg-{0}', github.event.merge_group.head_sha) }}
  cancel-in-progress: true

permissions:
  checks: read

jobs:
  final-status:
    name: "ci: final status check"
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 60
    steps:
      - name: Validate PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Validating PR title: $PR_TITLE"

          VALID_TYPES="feat|fix|chore"
          VALID_PKGS="auth|ci|cli|codegen|dashboard|deps|docs|examples|internal\/lib|nhost-js|nixops|postgres|storage|observability|stripe-graphql-js"

          if [[ ! "$PR_TITLE" =~ ^(${VALID_TYPES})\((${VALID_PKGS})\):\ .+ ]]; then
            echo "PR title does not follow the required format!"
            echo ""
            echo "Expected format: TYPE(PKG): SUMMARY"
            echo ""
            echo "Valid TYPEs:"
            echo "  - feat:   mark this pull request as a feature"
            echo "  - fix:    mark this pull request as a bug fix"
            echo "  - chore:  mark this pull request as a maintenance item"
            echo ""
            echo "Valid PKGs:"
            echo "  - auth, ci, cli, codegen, dashboard, deps, docs, examples,"
            echo "  - nhost-js, nixops, postgres, storage, observability, internal/lib"
            echo "  - stripe-graphql-js"
            echo ""
            echo "Example: feat(cli): add new command for database migrations"
            exit 1
          fi

          echo "PR title is valid!"

      - name: Wait for all checks and verify status
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.pull_request?.head?.sha
              || context.payload.merge_group?.head_sha
              || context.sha;
            const THIS_CHECK_NAME = 'ci: final status check';

            const POLL_INTERVAL_S = 30;
            // After all currently-known checks are complete, wait this long
            // for late-arriving checks before concluding.
            const SETTLE_TIME_S = 120;
            const MAX_WAIT_S = 2700; // 45 min

            const sleep = (s) => new Promise(r => setTimeout(r, s * 1000));

            // Fetch all check runs for the PR head SHA, excluding our own.
            async function getCheckRuns() {
              const allRuns = [];
              let page = 1;
              while (true) {
                const { data } = await github.rest.checks.listForRef({
                  owner,
                  repo,
                  ref: sha,
                  per_page: 100,
                  page,
                  filter: 'latest',
                });
                allRuns.push(...data.check_runs);
                if (allRuns.length >= data.total_count) break;
                page++;
              }
              return allRuns.filter((r) => r.name !== THIS_CHECK_NAME);
            }

            // Give other workflows time to be queued.
            core.info('Waiting 60s for check workflows to start...');
            await sleep(60);

            let elapsed = 60;
            let lastNewCheckTime = elapsed;
            let knownCheckCount = 0;

            while (elapsed < MAX_WAIT_S) {
              const runs = await getCheckRuns();

              if (runs.length > knownCheckCount) {
                core.info(
                  `New checks detected: ${runs.length} (was ${knownCheckCount})`,
                );
                lastNewCheckTime = elapsed;
                knownCheckCount = runs.length;
              }

              const pending = runs.filter((r) => r.status !== 'completed');
              const completed = runs.filter((r) => r.status === 'completed');
              const failed = completed.filter(
                (r) => !['success', 'skipped', 'neutral'].includes(r.conclusion),
              );

              const ts = `${Math.floor(elapsed / 60)}m${String(elapsed % 60).padStart(2, '0')}s`;
              core.info(
                `[${ts}] total=${runs.length} completed=${completed.length} pending=${pending.length} failed=${failed.length}`,
              );

              if (pending.length > 0) {
                core.info(
                  `  Pending: ${pending.map((r) => r.name).join(', ')}`,
                );
              }

              // All current checks are done and no new ones appeared within
              // the settle window — we can make a decision.
              const settled =
                pending.length === 0 &&
                elapsed - lastNewCheckTime >= SETTLE_TIME_S;

              if (settled) {
                if (runs.length === 0) {
                  core.info('No check workflows ran for this PR. Passing.');
                  return;
                }

                if (failed.length > 0) {
                  core.info('');
                  core.info('Failed checks:');
                  for (const r of failed) {
                    core.info(`  - ${r.name}: ${r.conclusion}`);
                  }
                  core.setFailed(`${failed.length} check(s) failed`);
                  return;
                }

                core.info('');
                core.info(`All ${completed.length} check(s) passed.`);
                return;
              }

              await sleep(POLL_INTERVAL_S);
              elapsed += POLL_INTERVAL_S;
            }

            core.setFailed('Timed out waiting for checks to complete');
