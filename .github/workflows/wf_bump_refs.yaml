---
name: "wf: bump refs"
on:
  workflow_call:
    inputs:
      NAME:
        required: true
        type: string
      PATH:
        required: true
        type: string
      VERSION:
        required: true
        type: string
    secrets:
      NHOST_BOT_APP_ID:
        required: true
      NHOST_BOT_PRIVATE_KEY:
        required: true

jobs:
  bump-refs:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    concurrency:
      group: bump-refs-main
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: "Generate App token"
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.NHOST_BOT_APP_ID }}
          private-key: ${{ secrets.NHOST_BOT_PRIVATE_KEY }}

      - name: "Check out repository"
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: "Bump version references"
        run: |
          cd ${{ inputs.PATH }}
          make changelog-bump-refs VER=${{ inputs.VERSION }}

      - name: "Commit and push to main"
        run: |
          if git diff --quiet; then
            echo "No version reference changes to commit"
            exit 0
          fi
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git commit -am "chore(${{ inputs.NAME }}): bump references to ${{ inputs.VERSION }}"
          git push origin main
