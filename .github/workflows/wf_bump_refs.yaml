---
name: "wf: bump refs"
on:
  workflow_call:
    inputs:
      NAME:
        required: true
        type: string
      PATH:
        required: true
        type: string
      VERSION:
        required: true
        type: string
    secrets:
      GH_PAT:
        required: true

jobs:
  bump-refs:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: "Check out repository"
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}

      - name: "Bump version references"
        run: |
          cd ${{ inputs.PATH }}
          make changelog-bump-refs VER=${{ inputs.VERSION }}

      - name: "Create Pull Request"
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_PAT }}
          commit-message: "chore(${{ inputs.NAME }}): bump references to ${{ inputs.VERSION }}"
          title: "chore(${{ inputs.NAME }}): bump references to ${{ inputs.VERSION }}"
          committer: GitHub <noreply@github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          body: |
            Bumps version references after release of `${{ inputs.NAME }}` to `${{ inputs.VERSION }}`.

            Generated by `make changelog-bump-refs VER=${{ inputs.VERSION }}` in `${{ inputs.PATH }}`.
          branch: bump-refs/${{ inputs.NAME }}
          delete-branch: true
          labels: |
            chore,${{ inputs.NAME }}
