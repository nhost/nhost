---
name: "ci: create release"
on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  create-release:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, 'release(')
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30

    permissions:
      id-token: write
      contents: write
      pull-requests: read
      actions: write

    steps:
    - name: "Generate App token"
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ secrets.NHOST_BOT_APP_ID }}
        private-key: ${{ secrets.NHOST_BOT_PRIVATE_KEY }}

    - name: "Check out repository"
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: "Extract project and version from PR title"
      id: extract
      env:
        TITLE: ${{ github.event.pull_request.title }}
      run: |
        PROJECT=$(echo "${TITLE}" | sed 's/release(\([^)]*\)).*/\1/')
        if [ -z "$PROJECT" ]; then
          echo "Error: Could not extract project name from PR title"
          exit 1
        fi

        VERSION=$(echo "${TITLE}" | sed 's/.*release([^)]*):\W*\(.*\).*/\1/')
        if [ -z "$VERSION" ]; then
          echo "Error: Could not extract version from PR title"
          exit 1
        fi

        cd $PROJECT

        PROJECT_NAME=$(make release-tag-name)

        echo "project=$PROJECT" >> $GITHUB_OUTPUT
        echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=$PROJECT_NAME@$VERSION" >> $GITHUB_OUTPUT

    - name: Configure aws
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_PRODUCTION_CORE_ACCOUNT_ID }}:role/github-actions-nhost-${{ github.event.repository.name }}
        aws-region: eu-central-1

    - name: Setup Nix with Cache
      uses: ./.github/actions/setup-nix
      with:
        NAME: ${{ steps.extract.outputs.project }}
        NIX_CACHE_PUB_KEY: ${{ secrets.NIX_CACHE_PUB_KEY }}
        NIX_CACHE_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_ACCESS_KEY_ID }}
        NIX_CACHE_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_SECRET_ACCESS_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: "Get unreleased changelog content"
      id: changelog
      env:
        PROJECT: ${{ steps.extract.outputs.project }}
      run: |
        cd "$PROJECT"
        CHANGELOG_CONTENT=$(nix develop .#cliff -c make changelog-get-unreleased)
        DELIMITER="EOF_$(openssl rand -hex 16)"
        echo "content<<$DELIMITER" >> $GITHUB_OUTPUT
        echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
        echo "$DELIMITER" >> $GITHUB_OUTPUT

    - name: "Create GitHub Release"
      env:
        # We need a non-GITHUB_TOKEN here so the release event triggers downstream workflows
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        TAG: ${{ steps.extract.outputs.tag }}
        NOTES: ${{ steps.changelog.outputs.content }}
      run: |
        gh release create "$TAG" \
          --title "$TAG" \
          --notes "$NOTES" \
          --target main
