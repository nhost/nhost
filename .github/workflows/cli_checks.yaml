---
name: "cli: check and build"
on:
  pull_request_target:
    paths:
      - ".github/workflows/cli_checks.yaml"
      - ".github/workflows/wf_check.yaml"
      - ".github/workflows/wf_build_artifacts.yaml"
      - ".github/workflows/cli_test_new_project.yaml"
      - ".github/workflows/cli_wf_e2e.yaml"

      # common build
      - "flake.nix"
      - "flake.lock"
      - "nixops/**"
      - "build/**"

      # common go
      - ".golangci.yaml"
      - "govulncheck.yaml"
      - "go.mod"
      - "go.sum"
      - "vendor/**"

      # cli
      - "cli/**"

      # lib
      - "internal/lib/clidocs/**"
      - "internal/lib/nhostclient/**"
      - "internal/lib/oapi/**"

      # constellation (imported by `nhost schema` for SDL dump/diff)
      - "services/constellation/**"

      # nhost-engine (bundled binary exercised by the engine-mode e2e leg)
      - "services/nhost-engine/**"

      # auth email templates (embedded into the CLI by `nhost init`)
      - "services/auth/email-templates/**"

      # docs
      - "docs/**"
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ startsWith(github.event_name, 'pull_request') && format('pr-{0}', github.event.pull_request.number) || format('push-{0}', github.sha) }}
  cancel-in-progress: ${{ startsWith(github.event_name, 'pull_request') }}

jobs:
  detect-changes:
    uses: ./.github/workflows/wf_detect_changes.yaml
    with:
      patterns: |
        .github/workflows/cli_checks.yaml
        .github/workflows/wf_check.yaml
        .github/workflows/wf_build_artifacts.yaml
        .github/workflows/cli_test_new_project.yaml
        flake.nix
        flake.lock
        nixops/**
        build/**
        .golangci.yaml
        govulncheck.yaml
        go.mod
        go.sum
        vendor/**
        cli/**
        internal/lib/clidocs/**
        internal/lib/nhostclient/**
        internal/lib/oapi/**
        services/constellation/**
        services/nhost-engine/**
        services/auth/email-templates/**
        docs/**

  check-permissions:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/check-permissions

  tests:
    uses: ./.github/workflows/wf_check.yaml
    needs:
      - detect-changes
      - check-permissions
    if: needs.detect-changes.outputs.should_run == 'true'
    with:
      NAME: cli
      PATH: cli
      GIT_REF: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_PRODUCTION_CORE_ACCOUNT_ID }}
      NIX_CACHE_PUB_KEY: ${{ secrets.NIX_CACHE_PUB_KEY }}
      NIX_CACHE_PRIV_KEY: ${{ secrets.NIX_CACHE_PRIV_KEY }}
      NIX_CACHE_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_ACCESS_KEY_ID }}
      NIX_CACHE_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_SECRET_ACCESS_KEY }}
      NHOST_PAT: ${{ secrets.NHOST_PAT }}

  build_artifacts:
    uses: ./.github/workflows/wf_build_artifacts.yaml
    needs:
      - detect-changes
      - check-permissions
    if: needs.detect-changes.outputs.should_run == 'true'
    with:
      NAME: cli
      PATH: cli
      GIT_REF: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
      VERSION: 0.0.0-dev # we use a fixed version here to avoid unnecessary rebuilds
      DOCKER: true
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_PRODUCTION_CORE_ACCOUNT_ID }}
      NIX_CACHE_PUB_KEY: ${{ secrets.NIX_CACHE_PUB_KEY }}
      NIX_CACHE_PRIV_KEY: ${{ secrets.NIX_CACHE_PRIV_KEY }}
      NIX_CACHE_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_ACCESS_KEY_ID }}
      NIX_CACHE_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_SECRET_ACCESS_KEY }}

  test_cli_build:
    uses: ./.github/workflows/cli_wf_test_new_project.yaml
    needs:
      - detect-changes
      - check-permissions
      - build_artifacts
    if: needs.detect-changes.outputs.should_run == 'true'
    with:
      NAME: cli
      PATH: cli
      GIT_REF: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_PRODUCTION_CORE_ACCOUNT_ID }}
      NIX_CACHE_PUB_KEY: ${{ secrets.NIX_CACHE_PUB_KEY }}
      NIX_CACHE_PRIV_KEY: ${{ secrets.NIX_CACHE_PRIV_KEY }}
      NIX_CACHE_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_ACCESS_KEY_ID }}
      NIX_CACHE_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_SECRET_ACCESS_KEY }}
      NHOST_PAT: ${{ secrets.NHOST_PAT }}

  build_engine_image:
    uses: ./.github/workflows/wf_build_artifacts.yaml
    needs:
      - detect-changes
      - check-permissions
    if: needs.detect-changes.outputs.should_run == 'true'
    with:
      NAME: nhost-engine
      PATH: services/nhost-engine
      GIT_REF: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
      VERSION: 0.0.0-dev # fixed version to avoid unnecessary rebuilds
      DOCKER: true
      # e2e runs on x86_64 only, so skip the arm build.
      OS_MATRIX: '["blacksmith-2vcpu-ubuntu-2404"]'
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_PRODUCTION_CORE_ACCOUNT_ID }}
      NIX_CACHE_PUB_KEY: ${{ secrets.NIX_CACHE_PUB_KEY }}
      NIX_CACHE_PRIV_KEY: ${{ secrets.NIX_CACHE_PRIV_KEY }}
      NIX_CACHE_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_ACCESS_KEY_ID }}
      NIX_CACHE_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_SECRET_ACCESS_KEY }}

  test_e2e:
    uses: ./.github/workflows/cli_wf_e2e.yaml
    needs:
      - detect-changes
      - check-permissions
      - build_artifacts
      - build_engine_image
    if: needs.detect-changes.outputs.should_run == 'true'
    with:
      GIT_REF: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_PRODUCTION_CORE_ACCOUNT_ID }}
      NIX_CACHE_PUB_KEY: ${{ secrets.NIX_CACHE_PUB_KEY }}
      NIX_CACHE_PRIV_KEY: ${{ secrets.NIX_CACHE_PRIV_KEY }}
      NIX_CACHE_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_ACCESS_KEY_ID }}
      NIX_CACHE_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_SECRET_ACCESS_KEY }}

  remove_label:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - check-permissions
    if: |
      needs.detect-changes.outputs.should_run == 'true' &&
      contains(github.event.pull_request.labels.*.name, 'safe_to_test')
    steps:
      - uses: actions-ecosystem/action-remove-labels@v1
        with:
          labels: |
            safe_to_test
