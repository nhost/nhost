---
on:
  workflow_call:
    inputs:
      NAME:
        type: string
        required: true
      GIT_REF:
        type: string
        required: false
      VERSION:
        type: string
        required: true
      PATH:
        type: string
        required: true
      DOCKER:
        type: boolean
        required: true
      OS_MATRIX:
        type: string
        required: false
        default: '["blacksmith-4vcpu-ubuntu-2404-arm", "blacksmith-2vcpu-ubuntu-2404"]'
      ENV:
        type: string
        required: false
        default: ""
      ARTIFACT_SUFFIX:
        type: string
        required: false
        default: ""
    secrets:
      AWS_ACCOUNT_ID:
        required: true
      NIX_CACHE_PUB_KEY:
        required: true
      NIX_CACHE_PRIV_KEY:
        required: true
      NIX_CACHE_ACCESS_KEY_ID:
        required: true
      NIX_CACHE_SECRET_ACCESS_KEY:
        required: true

jobs:
  artifacts:
    permissions:
      id-token: write
      contents: write

    defaults:
      run:
        working-directory: ${{ inputs.PATH }}

    strategy:
      matrix:
        os: ${{ fromJSON(inputs.OS_MATRIX) }}
      fail-fast: true

    runs-on: ${{ matrix.os }}
    timeout-minutes: 180

    steps:
      - name: "Set custom env"
        if: ${{ inputs.ENV != '' }}
        run: echo "${{ inputs.ENV }}" >> $GITHUB_ENV
        working-directory: .

      - name: "Check out repository"
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.GIT_REF }}

      - name: Configure aws
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-nhost-${{ github.event.repository.name }}
          aws-region: eu-central-1

      - name: Setup Nix with Cache
        uses: ./.github/actions/setup-nix
        with:
          NAME: ${{ inputs.NAME }}
          NIX_CACHE_PUB_KEY: ${{ secrets.NIX_CACHE_PUB_KEY }}
          NIX_CACHE_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_ACCESS_KEY_ID }}
          NIX_CACHE_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_SECRET_ACCESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Verify if we need to build"
        id: verify-build
        run: |
          # `nix build --dry-run` (inside `make build-dry-run`) walks the
          # full build graph and reports what would be built locally vs
          # fetched from configured substituters (cache.nixos.org + our
          # S3 cache). If any derivation would be built we have new paths
          # worth uploading. This catches the case where the top-level
          # output is cached but transitive build deps aren't — `nix
          # path-info --recursive` only sees the runtime closure, which
          # misses build-time intermediates.
          stderr_log=$(mktemp)
          if ! make build-dry-run 2>"$stderr_log" >/dev/null; then
            cat "$stderr_log" >&2
            rm -f "$stderr_log"
            exit 1
          fi
          if grep -q "will be built" "$stderr_log"; then
            export BUILD_NEEDED=yes
          else
            export BUILD_NEEDED=no
          fi
          rm -f "$stderr_log"
          echo BUILD_NEEDED=$BUILD_NEEDED >> $GITHUB_OUTPUT

      - name: Compute common env vars
        id: vars
        run: |
          if [ "${{ inputs.VERSION }}" = "0.0.0-dev" ]; then
            echo "VERSION=0.0.0-dev" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(make get-version VER=${{ inputs.VERSION }})" >> $GITHUB_OUTPUT
          fi
          ARCH=$([ "${{ runner.arch }}" == "X64" ] && echo "x86_64" || echo "aarch64")
          echo "ARCH=${ARCH}" >> $GITHUB_OUTPUT

      - name: "Build artifact"
        run: |
          make build
          zip -r result.zip result

      - name: "Push artifact to artifact repository"
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.NAME }}-artifact${{ inputs.ARTIFACT_SUFFIX }}-${{ steps.vars.outputs.ARCH }}-${{ steps.vars.outputs.VERSION }}
          path: ${{ inputs.PATH }}/result.zip
          retention-days: 7

      - name: "Build docker image"
        run: |
          sudo chmod 755 /run/containers
          sudo mkdir -p "/run/containers/$(id -u runner)"
          sudo chown runner: "/run/containers/$(id -u runner)"
          make build-docker-image
        if: ${{ inputs.DOCKER && runner.os != 'macOS' }}

      - name: "Push docker image to artifact repository"
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.NAME }}-docker-image${{ inputs.ARTIFACT_SUFFIX }}-${{ steps.vars.outputs.ARCH }}-${{ steps.vars.outputs.VERSION }}
          path: ${{ inputs.PATH }}/result
          retention-days: 7
        if: ${{ inputs.DOCKER && runner.os != 'macOS' }}

      - name: "Store Nix cache"
        uses: ./.github/actions/cache-nix
        with:
          NIX_CACHE_PRIV_KEY: ${{ secrets.NIX_CACHE_PRIV_KEY }}
          NIX_CACHE_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_ACCESS_KEY_ID }}
          NIX_CACHE_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_SECRET_ACCESS_KEY }}
        if: ${{ always() }}
