---
name: "nhostclient: check"
on:
  pull_request_target:
    paths:
      - ".github/workflows/nhostclient_checks.yaml"
      - ".github/workflows/wf_check.yaml"

      # common build
      - "flake.nix"
      - "flake.lock"
      - "nixops/**"
      - "build/**"

      # common go
      - ".golangci.yaml"
      - "go.mod"
      - "go.sum"
      - "vendor/**"

      # nhostclient
      - "internal/lib/nhostclient/**"

      # OpenAPI specs used for code generation
      - "services/auth/docs/openapi.yaml"
      - "services/storage/controller/openapi.yaml"
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('push-{0}', github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect-changes:
    uses: ./.github/workflows/wf_detect_changes.yaml
    with:
      patterns: |
        .github/workflows/nhostclient_checks.yaml
        .github/workflows/wf_check.yaml
        flake.nix
        flake.lock
        nixops/**
        build/**
        .golangci.yaml
        go.mod
        go.sum
        vendor/**
        internal/lib/nhostclient/**
        services/auth/docs/openapi.yaml
        services/storage/controller/openapi.yaml

  check-permissions:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "github.event_name: ${{ github.event_name }}"
          echo "github.event.pull_request.author_association: ${{ github.event.pull_request.author_association }}"
      - name: "This task will run and fail if user has no permissions and label safe_to_test isn't present"
        if: 'github.event_name == ''pull_request_target'' && ! ( contains(github.event.pull_request.labels.*.name, ''safe_to_test'') || contains(fromJson(''["OWNER", "MEMBER", "COLLABORATOR"]''), github.event.pull_request.author_association) )'
        run: |
          exit 1

  tests:
    uses: ./.github/workflows/wf_check.yaml
    needs:
      - detect-changes
      - check-permissions
    if: needs.detect-changes.outputs.should_run == 'true'
    with:
      NAME: nhostclient
      PATH: internal/lib/nhostclient
      GIT_REF: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_PRODUCTION_CORE_ACCOUNT_ID }}
      NIX_CACHE_PUB_KEY: ${{ secrets.NIX_CACHE_PUB_KEY }}
      NIX_CACHE_PRIV_KEY: ${{ secrets.NIX_CACHE_PRIV_KEY }}

  remove_label:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - check-permissions
    if: |
      needs.detect-changes.outputs.should_run == 'true' &&
      contains(github.event.pull_request.labels.*.name, 'safe_to_test')
    steps:
      - uses: actions-ecosystem/action-remove-labels@v1
        with:
          labels: |
            safe_to_test
