---
name: "ci: update changelog"
on:
  push:
    branches:
      - main

jobs:
  update-changelog:
    if: ${{ !startsWith(github.event.head_commit.message, 'release(') }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30

    strategy:
      matrix:
        project: [cli, dashboard, packages/nhost-js, packages/stripe-graphql-js, services/auth, services/functions, services/mcp, services/storage]

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      actions: write

    steps:
    - name: "Generate App token"
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ secrets.NHOST_BOT_APP_ID }}
        private-key: ${{ secrets.NHOST_BOT_PRIVATE_KEY }}

    - name: "Check out repository"
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ steps.app-token.outputs.token }}

    - name: Configure aws
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_PRODUCTION_CORE_ACCOUNT_ID }}:role/github-actions-nhost-${{ github.event.repository.name }}
        aws-region: eu-central-1

    - name: Setup Nix with Cache
      uses: ./.github/actions/setup-nix
      with:
        NAME: ${{ matrix.project }}
        NIX_CACHE_PUB_KEY: ${{ secrets.NIX_CACHE_PUB_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: "Get next version"
      id: version
      run: |
        cd ${{ matrix.project }}
        TAG_NAME=$(make release-tag-name)
        VERSION=$(nix develop .\#cliff -c make changelog-next-version)
        if git tag | grep -qx "$TAG_NAME@$VERSION"; then
          echo "Tag $TAG_NAME@$VERSION already exists, skipping release preparation"
        else
          echo "Tag $TAG_NAME@$VERSION does not exist, proceeding with release preparation"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        fi

    - name: "Update changelog"
      if: steps.version.outputs.version != ''
      run: |
        cd ${{ matrix.project }}
        nix develop .\#cliff -c make changelog-update

    - name: "Create Pull Request"
      if: steps.version.outputs.version != ''
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ steps.app-token.outputs.token }}
        commit-message: "release(${{ matrix.project }}): ${{ steps.version.outputs.version }}"
        title: "release(${{ matrix.project }}): ${{ steps.version.outputs.version }}"
        committer: ${{ steps.app-token.outputs.app-slug }}[bot] <${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>
        author: ${{ steps.app-token.outputs.app-slug }}[bot] <${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>
        body: |
          Automated release preparation for ${{ matrix.project }} version ${{ steps.version.outputs.version }}.

          Version references in dependent files (CLI sources, docs, etc.) are bumped in a follow-up PR after the release publishes — see `wf_bump_refs.yaml`.
        branch: release/${{ matrix.project }}
        delete-branch: true
        labels: |
          release,${{ matrix.project }}
