---
name: "functions: check and build"
on:
  pull_request_target:
    paths:
      - ".github/workflows/functions_checks.yaml"
      - ".github/workflows/wf_check.yaml"
      - ".github/workflows/wf_build_artifacts.yaml"

      # common build
      - "flake.nix"
      - "flake.lock"
      - "nixops/**"
      - "build/**"

      # common javascript
      - "biome.json"

      # functions
      - "services/functions/**"
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ startsWith(github.event_name, 'pull_request') && format('pr-{0}', github.event.pull_request.number) || format('push-{0}', github.sha) }}
  cancel-in-progress: ${{ startsWith(github.event_name, 'pull_request') }}

jobs:
  detect-changes:
    uses: ./.github/workflows/wf_detect_changes.yaml
    with:
      patterns: |
        .github/workflows/functions_checks.yaml
        .github/workflows/wf_check.yaml
        .github/workflows/wf_build_artifacts.yaml
        flake.nix
        flake.lock
        nixops/**
        build/**
        biome.json
        services/functions/**

  check-permissions:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "github.event_name: ${{ github.event_name }}"
          echo "github.event.pull_request.author_association: ${{ github.event.pull_request.author_association }}"
      - name: "This task will run and fail if user has no permissions and label safe_to_test isn't present"
        if: 'github.event_name == ''pull_request_target'' && ! ( contains(github.event.pull_request.labels.*.name, ''safe_to_test'') || contains(fromJson(''["OWNER", "MEMBER", "COLLABORATOR"]''), github.event.pull_request.author_association) )'
        run: |
          exit 1

  build_artifacts:
    strategy:
      matrix:
        node: ["20", "22"]
      fail-fast: true
    uses: ./.github/workflows/wf_build_artifacts.yaml
    needs:
      - detect-changes
      - check-permissions
    if: needs.detect-changes.outputs.should_run == 'true'
    with:
      NAME: functions
      PATH: services/functions
      GIT_REF: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
      VERSION: 0.0.0-dev # we use a fixed version here to avoid unnecessary rebuilds
      DOCKER: true
      ENV: "NODE_VERSION=${{ matrix.node }}"
      ARTIFACT_SUFFIX: "-node${{ matrix.node }}"
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_PRODUCTION_CORE_ACCOUNT_ID }}
      NIX_CACHE_PUB_KEY: ${{ secrets.NIX_CACHE_PUB_KEY }}
      NIX_CACHE_PRIV_KEY: ${{ secrets.NIX_CACHE_PRIV_KEY }}

  tests:
    uses: ./.github/workflows/wf_check.yaml
    needs:
      - detect-changes
      - check-permissions
      - build_artifacts
    if: needs.detect-changes.outputs.should_run == 'true'
    with:
      NAME: functions
      PATH: services/functions
      GIT_REF: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_PRODUCTION_CORE_ACCOUNT_ID }}
      NIX_CACHE_PUB_KEY: ${{ secrets.NIX_CACHE_PUB_KEY }}
      NIX_CACHE_PRIV_KEY: ${{ secrets.NIX_CACHE_PRIV_KEY }}
      NHOST_PAT: ${{ secrets.NHOST_PAT }}

  remove_label:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - check-permissions
    if: |
      needs.detect-changes.outputs.should_run == 'true' &&
      contains(github.event.pull_request.labels.*.name, 'safe_to_test')
    steps:
      - uses: actions-ecosystem/action-remove-labels@v1
        with:
          labels: |
            safe_to_test
