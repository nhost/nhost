---
name: "cli: release"
on:
  workflow_call:
    inputs:
      GIT_REF:
        required: true
        type: string
      VERSION:
        required: true
        type: string
      IS_PRERELEASE:
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ACCOUNT_ID:
        required: true
      NIX_CACHE_PUB_KEY:
        required: true
      NIX_CACHE_PRIV_KEY:
        required: true
      NIX_CACHE_ACCESS_KEY_ID:
        required: true
      NIX_CACHE_SECRET_ACCESS_KEY:
        required: true
      NHOST_BOT_APP_ID:
        required: true
      NHOST_BOT_PRIVATE_KEY:
        required: true
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      DISCORD_WEBHOOK:
        required: false

jobs:
  build_artifacts:
    uses: ./.github/workflows/wf_build_artifacts.yaml
    with:
      NAME: cli
      PATH: cli
      GIT_REF: ${{ inputs.GIT_REF }}
      VERSION: ${{ inputs.VERSION }}
      DOCKER: true
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      NIX_CACHE_PUB_KEY: ${{ secrets.NIX_CACHE_PUB_KEY }}
      NIX_CACHE_PRIV_KEY: ${{ secrets.NIX_CACHE_PRIV_KEY }}
      NIX_CACHE_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_ACCESS_KEY_ID }}
      NIX_CACHE_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_SECRET_ACCESS_KEY }}

  push-docker:
    uses: ./.github/workflows/wf_docker_push_image.yaml
    needs:
      - build_artifacts
    with:
      NAME: cli
      PATH: cli
      VERSION: ${{ inputs.VERSION }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  build-multiplatform:
    permissions:
      id-token: write
      contents: write

    defaults:
      run:
        working-directory: cli

    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 180

    steps:
      - name: "Generate App token"
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.NHOST_BOT_APP_ID }}
          private-key: ${{ secrets.NHOST_BOT_PRIVATE_KEY }}
          owner: nhost
          repositories: |
            nhost
            homebrew-tap

      - name: "Check out repository"
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.GIT_REF }}

      - name: Configure aws
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-nhost-${{ github.event.repository.name }}
          aws-region: eu-central-1

      - name: Setup Nix with Cache
        uses: ./.github/actions/setup-nix
        with:
          NAME: cli
          NIX_CACHE_PUB_KEY: ${{ secrets.NIX_CACHE_PUB_KEY }}
          NIX_CACHE_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_ACCESS_KEY_ID }}
          NIX_CACHE_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_SECRET_ACCESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute common env vars
        id: vars
        run: |
          VERSION=$(make get-version VER="${{ inputs.VERSION }}")
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          ARCH=$([ "${{ runner.arch }}" == "X64" ] && echo "x86_64" || echo "aarch64")
          echo "ARCH=${ARCH}" >> "$GITHUB_OUTPUT"

      - name: "Build artifact"
        run: |
          make build-multiplatform

      - name: "Upload assets"
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          export VERSION=${{ steps.vars.outputs.VERSION }}

          mkdir upload

          tar cvzf upload/cli-$VERSION-darwin-amd64.tar.gz -C result/darwin/amd64 cli
          tar cvzf upload/cli-$VERSION-darwin-arm64.tar.gz -C result/darwin/arm64 cli
          tar cvzf upload/cli-$VERSION-linux-amd64.tar.gz -C result/linux/amd64 cli
          tar cvzf upload/cli-$VERSION-linux-arm64.tar.gz -C result/linux/arm64 cli

          cd upload
          find . -type f -exec sha256sum {} + > ../checksums.txt
          cd ..

          cat checksums.txt

          gh release upload \
            --clobber "${{ github.ref_name }}" \
            ./upload/* checksums.txt

      - name: "Update Homebrew formula"
        uses: ./.github/actions/update-homebrew-formula
        with:
          formula-name: nhost
          homebrew-tap: nhost/homebrew-tap
          version: ${{ steps.vars.outputs.VERSION }}
          assets-dir: cli/upload
          github-token: ${{ steps.app-token.outputs.token }}

      - name: "Store Nix cache"
        uses: ./.github/actions/cache-nix
        with:
          NIX_CACHE_PRIV_KEY: ${{ secrets.NIX_CACHE_PRIV_KEY }}
          NIX_CACHE_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_ACCESS_KEY_ID }}
          NIX_CACHE_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_SECRET_ACCESS_KEY }}
        if: always()

  publish-npm:
    needs:
      - build-multiplatform
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 180

    defaults:
      run:
        working-directory: cli

    permissions:
      id-token: write
      contents: read

    steps:
      - name: "Check out repository"
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.GIT_REF }}

      - name: Configure aws
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-nhost-${{ github.event.repository.name }}
          aws-region: eu-central-1

      - name: Setup Nix with Cache
        uses: ./.github/actions/setup-nix
        with:
          NAME: cli
          NIX_CACHE_PUB_KEY: ${{ secrets.NIX_CACHE_PUB_KEY }}
          NIX_CACHE_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_ACCESS_KEY_ID }}
          NIX_CACHE_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_SECRET_ACCESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Stage npm packages"
        id: npm-vars
        env:
          RAW_VERSION: ${{ inputs.VERSION }}
        run: |
          set -euo pipefail

          VERSION=$(make get-version VER="$RAW_VERSION")
          if [[ "$VERSION" =~ (alpha|beta|dev|rc) ]]; then
            TAG=beta
          else
            TAG=latest
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          make build-npm

      - name: "Verify npm trusted publishing support"
        run: |
          set -euo pipefail

          NPM_VERSION=$(nix develop .#pnpm -c npm --version)
          echo "Using npm $NPM_VERSION"
          nix develop .#pnpm -c node - "$NPM_VERSION" <<'NODE'
          const version = process.argv[2];
          const parts = version.split('.').map((part) => Number.parseInt(part, 10));
          const required = [11, 5, 1];
          let ok = true;

          for (let index = 0; index < required.length; index += 1) {
            if (parts[index] > required[index]) {
              break;
            }
            if (parts[index] < required[index] || Number.isNaN(parts[index])) {
              ok = false;
              break;
            }
          }

          if (!ok) {
            throw new Error(`npm ${version} does not satisfy >= 11.5.1 for trusted publishing`);
          }
          NODE

      - name: "Validate staged npm packages"
        run: |
          set -euo pipefail

          nix develop .#pnpm -c node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const version = process.env.VERSION;
          const root = path.join('result', 'dist');
          const platforms = ['darwin-arm64', 'darwin-x64', 'linux-arm64', 'linux-x64'];
          const failures = [];

          const fail = (message) => failures.push(message);
          const readPackage = (dir) => JSON.parse(
            fs.readFileSync(path.join(root, dir, 'package.json'), 'utf8'),
          );
          const requireExecutable = (file) => {
            try {
              fs.accessSync(file, fs.constants.X_OK);
            } catch (error) {
              fail(`${file} is not executable`);
            }
          };

          if (!version) {
            fail('VERSION is empty');
          }
          if (!fs.existsSync(root)) {
            fail(`${root} does not exist`);
          }

          for (const platform of platforms) {
            const dir = path.join(root, platform);
            if (!fs.existsSync(dir)) {
              fail(`${dir} does not exist`);
              continue;
            }

            const pkg = readPackage(platform);
            const expectedName = `@nhost/cli-${platform}`;
            if (pkg.name !== expectedName) {
              fail(`${platform} package name is ${pkg.name}, expected ${expectedName}`);
            }
            if (!pkg.name?.startsWith('@nhost/cli-')) {
              fail(`${platform} package name must use the @nhost/cli- prefix`);
            }
            if (pkg.version !== version) {
              fail(`${pkg.name} version is ${pkg.version}, expected ${version}`);
            }
            requireExecutable(path.join(dir, 'nhost'));
          }

          const mainDir = path.join(root, 'main');
          if (!fs.existsSync(mainDir)) {
            fail(`${mainDir} does not exist`);
          } else {
            const main = readPackage('main');
            const optionalDependencies = main.optionalDependencies ?? {};
            const expectedDependencies = Object.fromEntries(
              platforms.map((platform) => [`@nhost/cli-${platform}`, version]),
            );

            if (main.name !== '@nhost/cli') {
              fail(`main package name is ${main.name}, expected @nhost/cli`);
            }
            if (main.version !== version) {
              fail(`main package version is ${main.version}, expected ${version}`);
            }
            if (JSON.stringify(optionalDependencies) !== JSON.stringify(expectedDependencies)) {
              fail(
                `main optionalDependencies are ${JSON.stringify(optionalDependencies)}, expected ${JSON.stringify(expectedDependencies)}`,
              );
            }
            requireExecutable(path.join(mainDir, 'bin', 'nhost'));
          }

          if (failures.length > 0) {
            throw new Error(`npm package validation failed:\n- ${failures.join('\n- ')}`);
          }

          console.log(`Validated @nhost/cli npm packages for ${version}`);
          NODE

      - name: "Publish to npm"
        run: |
          set -euo pipefail

          nix develop .#pnpm -c bash <<'BASH'
          set -euo pipefail

          publish() {
            dir="$1"
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")

            if [ "$version" != "$VERSION" ]; then
              echo "Version mismatch for $name: $version != $VERSION" >&2
              exit 1
            fi

            if [ "$(npm view "$name@$version" version 2>/dev/null || true)" = "$version" ]; then
              echo "--> skipping $name@$version (already published)"
              return
            fi

            echo "--> publishing $name@$version (tag: $TAG)"
            npm publish "$dir" --access public --tag "$TAG"
          }

          publish result/dist/darwin-arm64
          publish result/dist/darwin-x64
          publish result/dist/linux-arm64
          publish result/dist/linux-x64
          publish result/dist/main
          BASH

      - name: Send Discord notification
        if: always()
        uses: ./.github/actions/discord-notification
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          title: "Published @nhost/cli@${{ steps.npm-vars.outputs.version }} to npm"
          description: |
            **Status**: ${{ job.status }}
            **Tag**: ${{ steps.npm-vars.outputs.tag }}
            **Triggered by**: ${{ github.actor }}

            **Details**:
            - Version: ${{ steps.npm-vars.outputs.version }}
            - Package: @nhost/cli
          color: ${{ job.status == 'success' && '5763719' || '15548997' }}

  bump-refs:
    if: ${{ !inputs.IS_PRERELEASE }}
    uses: ./.github/workflows/wf_bump_refs.yaml
    needs:
      - build-multiplatform
    with:
      NAME: cli
      PATH: cli
      VERSION: ${{ inputs.VERSION }}
    secrets:
      NHOST_BOT_APP_ID: ${{ secrets.NHOST_BOT_APP_ID }}
      NHOST_BOT_PRIVATE_KEY: ${{ secrets.NHOST_BOT_PRIVATE_KEY }}
