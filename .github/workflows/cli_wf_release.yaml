---
name: "cli: release"
on:
  workflow_call:
    inputs:
      GIT_REF:
        required: true
        type: string
      VERSION:
        required: true
        type: string
      IS_PRERELEASE:
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ACCOUNT_ID:
        required: true
      NIX_CACHE_PUB_KEY:
        required: true
      NIX_CACHE_PRIV_KEY:
        required: true
      NIX_CACHE_ACCESS_KEY_ID:
        required: true
      NIX_CACHE_SECRET_ACCESS_KEY:
        required: true
      NHOST_BOT_APP_ID:
        required: true
      NHOST_BOT_PRIVATE_KEY:
        required: true
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      DISCORD_WEBHOOK:
        required: false

jobs:
  build_artifacts:
    uses: ./.github/workflows/wf_build_artifacts.yaml
    with:
      NAME: cli
      PATH: cli
      GIT_REF: ${{ inputs.GIT_REF }}
      VERSION: ${{ inputs.VERSION }}
      DOCKER: true
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      NIX_CACHE_PUB_KEY: ${{ secrets.NIX_CACHE_PUB_KEY }}
      NIX_CACHE_PRIV_KEY: ${{ secrets.NIX_CACHE_PRIV_KEY }}
      NIX_CACHE_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_ACCESS_KEY_ID }}
      NIX_CACHE_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_SECRET_ACCESS_KEY }}

  push-docker:
    uses: ./.github/workflows/wf_docker_push_image.yaml
    needs:
      - build_artifacts
    with:
      NAME: cli
      PATH: cli
      VERSION: ${{ inputs.VERSION }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  build-multiplatform:
    permissions:
      id-token: write
      contents: write

    defaults:
      run:
        working-directory: cli

    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 180

    steps:
      - name: "Generate App token"
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.NHOST_BOT_APP_ID }}
          private-key: ${{ secrets.NHOST_BOT_PRIVATE_KEY }}
          owner: nhost
          repositories: |
            nhost
            homebrew-tap

      - name: "Check out repository"
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.GIT_REF }}

      - name: Configure aws
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-nhost-${{ github.event.repository.name }}
          aws-region: eu-central-1

      - name: Setup Nix with Cache
        uses: ./.github/actions/setup-nix
        with:
          NAME: cli
          NIX_CACHE_PUB_KEY: ${{ secrets.NIX_CACHE_PUB_KEY }}
          NIX_CACHE_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_ACCESS_KEY_ID }}
          NIX_CACHE_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_SECRET_ACCESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute common env vars
        id: vars
        run: |
          VERSION=$(make get-version VER="${{ inputs.VERSION }}")
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          ARCH=$([ "${{ runner.arch }}" == "X64" ] && echo "x86_64" || echo "aarch64")
          echo "ARCH=${ARCH}" >> "$GITHUB_OUTPUT"

      - name: "Build artifact"
        run: |
          make build-multiplatform

      - name: "Upload assets"
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          export VERSION=${{ steps.vars.outputs.VERSION }}

          mkdir upload

          tar cvzf upload/cli-$VERSION-darwin-amd64.tar.gz -C result/darwin/amd64 cli
          tar cvzf upload/cli-$VERSION-darwin-arm64.tar.gz -C result/darwin/arm64 cli
          tar cvzf upload/cli-$VERSION-linux-amd64.tar.gz -C result/linux/amd64 cli
          tar cvzf upload/cli-$VERSION-linux-arm64.tar.gz -C result/linux/arm64 cli

          cd upload
          find . -type f -exec sha256sum {} + > ../checksums.txt
          cd ..

          cat checksums.txt

          gh release upload \
            --clobber "${{ github.ref_name }}" \
            ./upload/* checksums.txt

      - name: "Update Homebrew formula"
        uses: ./.github/actions/update-homebrew-formula
        with:
          formula-name: nhost
          homebrew-tap: nhost/homebrew-tap
          version: ${{ steps.vars.outputs.VERSION }}
          assets-dir: cli/upload
          github-token: ${{ steps.app-token.outputs.token }}

      - name: "Store Nix cache"
        uses: ./.github/actions/cache-nix
        with:
          NIX_CACHE_PRIV_KEY: ${{ secrets.NIX_CACHE_PRIV_KEY }}
          NIX_CACHE_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_ACCESS_KEY_ID }}
          NIX_CACHE_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_SECRET_ACCESS_KEY }}
        if: always()

  publish-npm:
    needs:
      - build-multiplatform
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 180

    defaults:
      run:
        working-directory: cli

    permissions:
      id-token: write
      contents: read

    steps:
      - name: "Check out repository"
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.GIT_REF }}

      - name: Configure aws
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-nhost-${{ github.event.repository.name }}
          aws-region: eu-central-1

      - name: Setup Nix with Cache
        uses: ./.github/actions/setup-nix
        with:
          NAME: cli
          NIX_CACHE_PUB_KEY: ${{ secrets.NIX_CACHE_PUB_KEY }}
          NIX_CACHE_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_ACCESS_KEY_ID }}
          NIX_CACHE_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_SECRET_ACCESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Stage npm packages"
        id: npm-vars
        env:
          RAW_VERSION: ${{ inputs.VERSION }}
        run: |
          set -euo pipefail

          VERSION=$(make get-version VER="$RAW_VERSION")
          if [[ "$VERSION" =~ (alpha|beta|dev|rc) ]]; then
            TAG=beta
          else
            TAG=latest
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          make build-npm

      - name: "Validate staged npm packages"
        run: make validate-npm

      - name: "Publish to npm"
        run: make publish-npm NPM_TAG="$TAG"

      - name: Send Discord notification
        if: always()
        uses: ./.github/actions/discord-notification
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          title: "Published @nhost/cli@${{ steps.npm-vars.outputs.version }} to npm"
          description: |
            **Status**: ${{ job.status }}
            **Tag**: ${{ steps.npm-vars.outputs.tag }}
            **Triggered by**: ${{ github.actor }}

            **Details**:
            - Version: ${{ steps.npm-vars.outputs.version }}
            - Package: @nhost/cli
          color: ${{ job.status == 'success' && '5763719' || '15548997' }}

  bump-refs:
    if: ${{ !inputs.IS_PRERELEASE }}
    uses: ./.github/workflows/wf_bump_refs.yaml
    needs:
      - build-multiplatform
    with:
      NAME: cli
      PATH: cli
      VERSION: ${{ inputs.VERSION }}
    secrets:
      NHOST_BOT_APP_ID: ${{ secrets.NHOST_BOT_APP_ID }}
      NHOST_BOT_PRIVATE_KEY: ${{ secrets.NHOST_BOT_PRIVATE_KEY }}
