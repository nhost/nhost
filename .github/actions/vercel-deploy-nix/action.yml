name: "Build and deploy Vercel output with Nix"
description: "Build and deploy a Vercel output through cacheable Nix derivations and expose the deployment URL"
inputs:
  NAME:
    description: "Project name / flake package prefix"
    required: true
  ENVIRONMENT:
    description: "Vercel target environment"
    required: true
  VERCEL_TEAM_ID:
    description: "Vercel team/org ID"
    required: true
  VERCEL_PROJECT_ID:
    description: "Vercel project ID"
    required: true
  VERCEL_DEPLOY_TOKEN:
    description: "Vercel token used to deploy"
    required: true
  TURBO_TOKEN:
    description: "Turbo remote cache token"
    required: false
    default: ""
  VERCEL_CACHE_BUSTER:
    description: "Optional manual cache-buster value for the Nix Vercel build/deploy derivations"
    required: false
    default: ""
outputs:
  out-path:
    description: "Nix store path containing the deploy result"
    value: ${{ steps.deploy.outputs.out-path }}
  preview-url:
    description: "Vercel deployment URL"
    value: ${{ steps.deploy.outputs.preview-url }}
runs:
  using: "composite"
  steps:
    - id: deploy
      shell: bash
      env:
        INPUT_NAME: ${{ inputs.NAME }}
        INPUT_ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
        INPUT_VERCEL_TEAM_ID: ${{ inputs.VERCEL_TEAM_ID }}
        INPUT_VERCEL_PROJECT_ID: ${{ inputs.VERCEL_PROJECT_ID }}
        INPUT_VERCEL_DEPLOY_TOKEN: ${{ inputs.VERCEL_DEPLOY_TOKEN }}
        INPUT_TURBO_TOKEN: ${{ inputs.TURBO_TOKEN }}
        INPUT_VERCEL_CACHE_BUSTER: ${{ inputs.VERCEL_CACHE_BUSTER }}
      run: |
        set -euo pipefail

        env_file="/tmp/nhost-vercel-${INPUT_NAME}-${INPUT_ENVIRONMENT}.env"
        vercel_environment_dir="/tmp/nhost-vercel-${INPUT_NAME}-${INPUT_ENVIRONMENT}.vercel"
        result_link="${RUNNER_TEMP}/nhost-vercel-deploy-${INPUT_NAME}-${INPUT_ENVIRONMENT}"
        trap 'rm -f "$env_file"; rm -rf "$vercel_environment_dir"' EXIT

        write_env() {
          local name="$1"
          local value="$2"
          printf 'export %s=%q\n' "$name" "$value"
        }

        install -m 600 /dev/null "$env_file"
        {
          write_env VERCEL_ORG_ID "$INPUT_VERCEL_TEAM_ID"
          write_env VERCEL_PROJECT_ID "$INPUT_VERCEL_PROJECT_ID"
          write_env VERCEL_DEPLOY_TOKEN "$INPUT_VERCEL_DEPLOY_TOKEN"
          write_env TURBO_TOKEN "$INPUT_TURBO_TOKEN"
          write_env TURBO_TEAM nhost
          write_env CI "${CI:-true}"
          write_env NEXT_TELEMETRY_DISABLED "${NEXT_TELEMETRY_DISABLED:-1}"
        } > "$env_file"

        if ! getent group nixbld > /dev/null; then
          echo "::error::nixbld group is missing; refusing to make the secret env file world-readable"
          exit 1
        fi
        if ! sudo chgrp nixbld "$env_file"; then
          echo "::error::failed to grant nixbld group access to the secret env file"
          exit 1
        fi
        chmod 640 "$env_file"

        rm -rf "$vercel_environment_dir"
        VERCEL_ORG_ID="$INPUT_VERCEL_TEAM_ID" \
          VERCEL_PROJECT_ID="$INPUT_VERCEL_PROJECT_ID" \
          VERCEL_DEPLOY_TOKEN="$INPUT_VERCEL_DEPLOY_TOKEN" \
          VERCEL_ENVIRONMENT_DIR="$vercel_environment_dir" \
          INPUT_ENVIRONMENT="$INPUT_ENVIRONMENT" \
          nix develop .#vercel -c bash -s <<'BASH'
            set -euo pipefail

            tmp_dir="$(mktemp -d)"
            trap "rm -rf \"$tmp_dir\"" EXIT
            export HOME="$tmp_dir/home"
            export NO_UPDATE_NOTIFIER=1
            export VERCEL_TELEMETRY_DISABLED=1
            work_dir="$tmp_dir/work"
            mkdir -p "$HOME/.cache/com.vercel.cli/package-updates" "$work_dir/.vercel"
            cd "$work_dir"
            node -e "const fs = require('fs'); fs.writeFileSync('.vercel/project.json', JSON.stringify({ orgId: process.env.VERCEL_ORG_ID, projectId: process.env.VERCEL_PROJECT_ID }, null, 2) + '\n');"
            vercel pull --yes --environment="$INPUT_ENVIRONMENT" --token "$VERCEL_DEPLOY_TOKEN" >/dev/null
            mkdir -p "$VERCEL_ENVIRONMENT_DIR"
            cp -r .vercel/. "$VERCEL_ENVIRONMENT_DIR"/
        BASH
        if ! sudo chgrp -R nixbld "$vercel_environment_dir"; then
          echo "::error::failed to grant nixbld group access to the Vercel environment directory"
          exit 1
        fi
        find "$vercel_environment_dir" -type d -exec chmod 750 {} +
        find "$vercel_environment_dir" -type f -exec chmod 640 {} +

        rm -f "$result_link"
        VERCEL_ORG_ID="$INPUT_VERCEL_TEAM_ID" \
          VERCEL_PROJECT_ID="$INPUT_VERCEL_PROJECT_ID" \
          VERCEL_CACHE_BUSTER="$INPUT_VERCEL_CACHE_BUSTER" \
          nix build \
            --impure \
            --print-build-logs \
            --out-link "$result_link" \
            ".#${INPUT_NAME}-vercel-deploy-${INPUT_ENVIRONMENT}"

        out_path="$(readlink -f "$result_link")"
        preview_url="$(tr -d '\r' < "$out_path/preview-url")"
        echo "out-path=$out_path" >> "$GITHUB_OUTPUT"
        echo "preview-url=$preview_url" >> "$GITHUB_OUTPUT"
        echo "Vercel deployment URL: $preview_url"
