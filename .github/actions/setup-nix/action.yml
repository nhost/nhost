name: 'Setup Nix'
description: 'Install Nix and setup caching for Nhost projects'
inputs:
  NAME:
    description: 'Project name for cache key'
    required: true
  NIX_CACHE_PUB_KEY:
    description: 'Nix cache public key'
    required: true
  GITHUB_TOKEN:
    description: 'GitHub token for Nix access'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        install_url: "https://releases.nixos.org/nix/nix-2.28.5/install"
        install_options: "--no-daemon"
        extra_nix_config: |
          download-buffer-size = 500000000
          experimental-features = nix-command flakes
          sandbox = false
          access-tokens = github.com=${{ inputs.GITHUB_TOKEN }}
          substituters = https://cache.nixos.org/?priority=40 s3://nhost-nix-cache?region=eu-central-1&priority=50
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= ${{ inputs.NIX_CACHE_PUB_KEY }}
          keep-env-derivations = true
          keep-outputs = true

    - name: "Verify nixops is cached"
      if: ${{ inputs.NAME != 'nixops' }}
      shell: bash
      run: |
        ARCH=$([ "$(uname -m)" = "x86_64" ] && echo "x86_64" || echo "aarch64")
        outPath=$(nix eval --raw .\#packages.$ARCH-linux.nixops.outPath)
        storeHash=$(basename "$outPath" | cut -d- -f1)
        echo "nixops outPath: $outPath"
        echo "nixops storeHash: $storeHash"
        if ! aws s3api head-object --bucket nhost-nix-cache --region eu-central-1 --key "$storeHash.narinfo" >/dev/null 2>&1; then
          echo "::error::nixops ($storeHash) needs to be rebuilt — build and cache nixops first"
          exit 1
        fi

