name: 'Cache Nix to R2'
description: 'Copy Nix store to the R2-backed (S3-compatible) cache'
inputs:
  NIX_CACHE_PRIV_KEY:
    description: 'Nix cache private key'
    required: true
  NIX_CACHE_ACCESS_KEY_ID:
    description: 'R2 access key id for writing to the Nix cache'
    required: true
  NIX_CACHE_SECRET_ACCESS_KEY:
    description: 'R2 secret access key for writing to the Nix cache'
    required: true

runs:
  using: 'composite'
  steps:
    - name: "Cache build"
      shell: bash
      env:
        AWS_ACCESS_KEY_ID: ${{ inputs.NIX_CACHE_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.NIX_CACHE_SECRET_ACCESS_KEY }}
      run: |
        S3_BUCKET="nhost-nix-cache"
        S3_REGION="auto"
        S3_ENDPOINT="https://14bc02755b64adb7c8c62b5420d0a457.eu.r2.cloudflarestorage.com"
        BUILT_PATHS_FILE="/tmp/nix-built-paths"
        # R2 uses static keys; make sure no stale OIDC session token lingers,
        # which would break SigV4 signing with these credentials.
        unset AWS_SESSION_TOKEN

        elapsed() {
          local start=$1
          echo "$(( $(date +%s) - start ))s"
        }

        upload_to_s3() {
          set -euo pipefail
          local store_path="$1"
          local t0=$(date +%s)
          local store_hash
          store_hash=$(basename "$store_path" | cut -d- -f1)

          # Get path metadata
          local info
          info=$(nix path-info --json "$store_path")
          local nar_hash_sri
          nar_hash_sri=$(echo "$info" | jq -r ".[\"$store_path\"].narHash")
          local nar_hash
          nar_hash=$(nix hash convert --to nix32 "$nar_hash_sri")
          local nar_size
          nar_size=$(echo "$info" | jq -r ".[\"$store_path\"].narSize")
          local refs
          refs=$(echo "$info" | jq -r "[.[\"$store_path\"].references[] | split(\"/\")[-1]] | join(\" \")")
          local sigs
          sigs=$(echo "$info" | jq -r ".[\"$store_path\"].signatures[]")

          # Create compressed NAR
          local tmp_nar
          tmp_nar=$(mktemp)
          local t1=$(date +%s)
          nix nar pack "$store_path" | zstd -q > "$tmp_nar"
          local file_size
          # `wc -c` is portable across GNU and BSD coreutils (stat flags differ).
          file_size=$(wc -c < "$tmp_nar" | tr -d '[:space:]')
          local file_hash
          file_hash=$(nix-hash --type sha256 --base32 --flat "$tmp_nar")
          local t2=$(date +%s)

          # Upload NAR
          aws s3 cp "$tmp_nar" "s3://${S3_BUCKET}/nar/${file_hash}.nar.zst" \
            --endpoint-url "$S3_ENDPOINT" --region "$S3_REGION" --quiet
          rm "$tmp_nar"
          local t3=$(date +%s)

          # Build narinfo
          local narinfo
          narinfo="StorePath: ${store_path}
        URL: nar/${file_hash}.nar.zst
        Compression: zstd
        FileHash: sha256:${file_hash}
        FileSize: ${file_size}
        NarHash: sha256:${nar_hash}
        NarSize: ${nar_size}
        References: ${refs}"

          while IFS= read -r sig; do
            [ -n "$sig" ] && narinfo="${narinfo}
        Sig: ${sig}"
          done <<< "$sigs"

          # Upload narinfo
          echo "$narinfo" | aws s3 cp - "s3://${S3_BUCKET}/${store_hash}.narinfo" \
            --endpoint-url "$S3_ENDPOINT" --region "$S3_REGION" --quiet

          echo "Uploaded $(basename "$store_path") (nar_size=${nar_size} file_size=${file_size} compress=$(( t2 - t1 ))s upload=$(( t3 - t2 ))s total=$(( t3 - t0 ))s)"
        }
        export -f upload_to_s3 elapsed
        export S3_BUCKET S3_REGION S3_ENDPOINT

        STEP_START=$(date +%s)

        # Find paths built by this job. setup-nix installs a Nix post-build
        # hook that appends OUT_PATHS here; substituted paths are not recorded.
        T=$(date +%s)
        if [ ! -s "$BUILT_PATHS_FILE" ]; then
          echo "No post-build-hook paths recorded at $BUILT_PATHS_FILE"
          exit 0
        fi

        # `mapfile` requires bash 4+, which macOS doesn't ship. Use a portable
        # `while read` loop instead.
        LOCAL_PATHS=()
        while IFS= read -r line; do
          [ -e "$line" ] || continue
          case "$line" in
            /nix/store/*.drv) ;;
            /nix/store/*) LOCAL_PATHS+=("$line") ;;
          esac
        done < <(sort -u "$BUILT_PATHS_FILE")
        echo "[discover] Found ${#LOCAL_PATHS[@]} built paths in $(elapsed $T)"

        if [ ${#LOCAL_PATHS[@]} -eq 0 ]; then
          echo "No built paths to cache"
          exit 0
        fi

        # Sign only paths built by this job.
        T=$(date +%s)
        printf '%s\n' "${LOCAL_PATHS[@]}" \
          | xargs nix store sign --key-file <(echo "${{ inputs.NIX_CACHE_PRIV_KEY }}")
        echo "[sign] Signed ${#LOCAL_PATHS[@]} paths in $(elapsed $T)"

        # Upload built paths directly. If another job won the race and already
        # cached the same path, overwriting the identical NAR/narinfo is cheaper
        # than issuing one R2 HEAD request per path.
        T=$(date +%s)
        printf '%s\n' "${LOCAL_PATHS[@]}" \
          | xargs -P 4 -I{} bash -c 'upload_to_s3 "$@"' _ {}
        echo "[upload] Uploaded ${#LOCAL_PATHS[@]} paths in $(elapsed $T)"

        echo "[total] Cache step completed in $(elapsed $STEP_START)"
