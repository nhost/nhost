          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/ScheduledEventStatus"
        tries:
          type: integer
        trigger_name:
          type: string
        comment:
          type: string
          nullable: true
        header_conf:
          $ref: "#/components/schemas/Headers"
        payload:
          type: object
        retry_conf:
          $ref: "#/components/schemas/RetryConfCT"
        webhook_conf:
          type: string
        request_transform:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/RequestTransformation"
        response_transform:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/ResponseTransformation"

    GetScheduledEventInvocationsOperation:
      type: object
      required:
        - type
        - args
      properties:
        type:
          type: string
          enum: [get_scheduled_event_invocations]
        args:
          $ref: "#/components/schemas/GetScheduledEventInvocationsArgs"

    GetScheduledEventInvocationsArgs:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          description: Type of the Scheduled Trigger.
          enum: [one_off, cron]
        trigger_name:
          type: string
          description: Name of the cron trigger. Required only when type is cron.
        event_id:
          type: string
          description: Getting invocations of the specified event.
        limit:
          type: integer
          description: Maximum number of events to be returned in one API call.
        offset:
          type: integer
          description: Starting point from where the rows need to be returned.
        get_rows_count:
          type: boolean
          description: Flag to indicate whether number of rows returned should be included in the response.

    GetScheduledEventInvocationsResponse:
      type: object
      required:
        - invocations
      properties:
        invocations:
          type: array
          items:
            $ref: "#/components/schemas/InvocationLogEntry"

    InvocationLogEntry:
      type: object
      required:
        - id
        - event_id
        - status
        - request
        - created_at
      properties:
        id:
          type: string
          description: Represents a UUID for invocation.
          example: d1de2b04-dbb9-4d21-bdaf-25c3dfef3d7b
        event_id:
          type: string
          description: Unique identifier for the event
          example: a7b67072-980d-4cfd-bbfa-a8ee749f453e
        created_at:
          type: string
          format: date-time
          description: Represents a timestamp value for the invocation of the trigger.
          example: 2025-09-19T16:01:31.086239Z
        status:
          type: integer
          description: HTTP status code of the webhook response
          nullable: true
          example: 200
        request:
          type: object
          description: Details of the HTTP request sent to the webhook
          required:
            - headers
            - payload
            - version
          properties:
            headers:
              $ref: "#/components/schemas/EventInvocationLogEntryHeaders"
            payload:
              type: object
              description: The event payload sent to the webhook
              additionalProperties: true
            version:
              type: string
              description: Version of the event payload format
              example: "1"
        response:
          type: object
          description: Details of the HTTP response from the webhook
          required:
            - data
            - type
            - version
          properties:
            data:
              type: object
              description: Response data from the webhook
              properties:
                body:
                  type: string
                  description: Response body as string
                headers:
                  $ref: "#/components/schemas/EventInvocationLogEntryHeaders"
                status:
                  type: integer
                  description: HTTP status code
                message:
                  type: string
                  description: Error message
                  example: '{"message":"Connection failure: ...}'

            type:
              type: string
              description: Type of response
              example: webhook_response, client_error
            version:
              type: string
              description: Version of the response format
              example: "1"

    CreateScheduledEventOperation:
      type: object
      description: Used to create a scheduled event.
      required:
        - type
        - args
      properties:
        type:
          type: string
          enum: [create_scheduled_event]
        args:
          $ref: "#/components/schemas/CreateScheduledEventArgs"

    CreateScheduledEventArgs:
      type: object
      required:
        - webhook
        - schedule_at
      properties:
        webhook:
          type: string
          description: URL of the webhook. A String value which supports templating environment variables enclosed in {{ and }}.
          example: "{{SERVICE_URL}}/hooks"
        schedule_at:
          type: string
          format: date-time
          description: The time at which the invocation should be invoked (ISO8601 format).
          example: "2025-09-19T16:01:31.086239Z"
        payload:
          type: object
          description: Any JSON payload which will be sent when the webhook is invoked.
          additionalProperties: true
        headers:
          description: List of headers to be sent with the webhook
          $ref: "#/components/schemas/Headers"
        retry_conf:
          description: Retry configuration if scheduled event delivery fails
          $ref: "#/components/schemas/RetryConfCT"
        comment:
          type: string
          description: Custom comment.

    DeleteScheduledEventOperation:
      type: object
      required:
        - type
        - args
      properties:
        type:
          type: string
          enum: [delete_scheduled_event]
        args:
          $ref: "#/components/schemas/DeleteScheduledEventArgs"

    DeleteScheduledEventArgs:
      type: object
      required:
        - type
        - event_id
      properties:
        type:
          type: string
          description: Type of the scheduled event.
          enum: [one_off, cron]
        event_id:
          type: string
          description: The ID of the scheduled event.
