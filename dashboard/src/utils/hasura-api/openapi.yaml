    RetryConfCT:
      type: object
      description: Retry configuration when delivery to the webhook of a cron trigger fails
      properties:
        num_retries:
          type: integer
          description: Number of times to retry delivery.
          default: 0
        retry_interval_seconds:
          type: integer
          description: Number of seconds to wait between each retry.
          default: 10
        timeout_seconds:
          type: integer
          description: Number of seconds to wait for the webhook response before timing out.
