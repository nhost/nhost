# --- Legacy Deployments (deprecated, read-only queries only) ---

fragment DeploymentRow on deployments {
  id
  commitSHA
  deploymentStartedAt
  deploymentEndedAt
  deploymentStatus
  commitUserName
  commitUserAvatarUrl
  commitMessage
}

fragment Deployment on deployments {
  id
  commitMessage
  commitSHA
  commitUserName
  commitUserAvatarUrl
  deploymentStartedAt
  deploymentEndedAt
  deploymentStatus
  metadataStartedAt
  metadataEndedAt
  metadataStatus
  migrationsStartedAt
  migrationsEndedAt
  migrationsStatus
  functionsStartedAt
  functionsEndedAt
  functionsStatus
  deploymentLogs(order_by: { createdAt: asc }) {
    id
    createdAt
    message
  }
}

query getDeployments($id: uuid!, $limit: Int!, $offset: Int!) {
  deployments(
    where: { appId: { _eq: $id } }
    order_by: { deploymentStartedAt: desc }
    limit: $limit
    offset: $offset
  ) {
    ...DeploymentRow
  }
}

query getLegacyDeployment($id: uuid!) {
  deployment(id: $id) {
    ...Deployment
  }
}

query getLatestDeployedDeployment($appId: uuid!) {
  deployments(
    where: { deploymentStatus: { _eq: "DEPLOYED" }, appId: { _eq: $appId } }
    order_by: { deploymentStartedAt: desc }
    limit: 1
  ) {
    ...DeploymentRow
  }
}

# --- Pipeline Runs ---

fragment PipelineRunRow on pipelineRuns {
  id
  name
  startedAt
  endedAt
  status
  input
  appId
  createdAt
}
fragment PipelineRun on pipelineRuns {
  id
  name
  startedAt
  endedAt
  status
  input
  substatus
  appId
  createdAt
}

subscription PendingOrRunningPipelineRunsSub($appId: uuid!) {
  pipelineRuns(
    where: { status: { _in: [pending, running] }, appId: { _eq: $appId } }
  ) {
    ...PipelineRunRow
  }
}

subscription LatestSucceededPipelineRunSub($appId: uuid!) {
  pipelineRuns(
    where: { status: { _eq: succeeded }, appId: { _eq: $appId } }
    order_by: { startedAt: desc }
    limit: 1
    offset: 0
  ) {
    ...PipelineRunRow
  }
}

mutation InsertPipelineRun($object: pipelineRuns_insert_input!) {
  insertPipelineRun(object: $object) {
    ...PipelineRunRow
  }
}

subscription getPipelineRunsSub($id: uuid!, $limit: Int!, $offset: Int!) {
  pipelineRuns(
    where: { appId: { _eq: $id } }
    order_by: { startedAt: desc }
    limit: $limit
    offset: $offset
  ) {
    ...PipelineRunRow
  }
}

subscription pipelineRunSub($id: uuid!) {
  pipelineRun(id: $id) {
    ...PipelineRun
  }
}

query getPipelineRun($id: uuid!) {
  pipelineRun(id: $id) {
    ...PipelineRun
  }
}
