query GetDeploymentLogs($deploymentID: uuid!) {
  deploymentLogs: deploymentLogs(
    where: {deploymentId: {_eq: $deploymentID}},
    order_by: {createdAt: asc}
   ) {
    id
    createdAt
    message
  }
  deployment: deployment(
    id: $deploymentID
  ) {
    deploymentEndedAt
    deploymentStatus
  }
}

query ListUnifiedDeployments($appID: uuid!) {
  unifiedDeployments(
    where: {appId: {_eq: $appID}},
    order_by: {startedAt: desc},
    limit: 10,
  ) {
    id
    appId
    source
    commitSHA
    commitUserName
    commitMessage
    startedAt
    endedAt
    status
  }
}

query GetPipelineRun($id: uuid!) {
  pipelineRun(id: $id) {
    id
    status
    startedAt
    endedAt
    appId
    createdAt
  }
}

query GetPipelineRunLogs($appID: String!, $pipelineRunID: String!, $from: Timestamp, $to: Timestamp) {
  getPipelineRunLogs(
    appID: $appID,
    pipelineRunID: $pipelineRunID,
    from: $from,
    to: $to,
  ) {
    timestamp
    task
    log
  }
}

mutation InsertPipelineRun($object: pipelineRuns_insert_input!) {
  insertPipelineRun(object: $object) {
    id
    status
    appId
  }
}
